# Kafka Migration Testing — full BI schema (116 models)
# Grains: CRT-6248 "Classification of BI and Grain" (verbatim, case-sensitive).
# Blocked flags: Kafka Migration Testing master tracker (§9).
#    = Kafka import not landed   GRAIN = known grain problem
#   REMOVAL      = set for removal, not in ThoughtSpot production
#
# Connection: simple username/password auth by default (see .env / .env.example).

connection:
  #role: UAT_ANALYTICS_ROLE
  warehouse: null
  query_tag: kafka_migration_testing
  #use_secondary_roles: [PROD_ANALYTICS_ENGINEER_ROLE]

environments:
  # Each side accepts 'DB' (schema taken from 'schema' below) or 'DB.SCHEMA'.
  prod_db: UAT_DB.BI_PRD   # static snapshot of the PROD BI schema
  uat_db: UAT_DB.BI
  schema: BI               # fallback schema for unqualified sides
  active_tenants: UAT_DB.BI.TEMP_ACTIVE_TENANTS # Can be replaced with EDP_ODS.HUB_SITECONFIG

defaults:
  nullif_text: true
  trim_text: false
  always_fingerprint: false
  # Examples captured on failure (keys, duplicates, T2 per-client breakdown).
  # Displayed collapsed (first 10) in the dashboard; print/export shows all.
  sample_rows: 1000
  # Full-row T2 samples are WIDE (every projected column) — kept smaller so
  # results.json / dashboard.html stay manageable. Raise if you need more.
  full_row_sample_rows: 100
  # Differences at or below this percentage (of the larger side / shared keys)
  # produce status ACCEPTED instead of FAIL — across T1, T2 and T3.
  # Set 0 to disable.
  diff_threshold_pct: 0.1
  # T3 per-column examples: sample this many example rows for each of the top
  # N mismatching columns (grain key + PROD value vs UAT value).
  t3_sample_columns: 20
  t3_samples_per_column: 15
  # Block types to SKIP at runtime. Skipped tables still appear in the report
  # as BLOCKED. GRAIN is deliberately NOT skipped by default — those tables
  # still get useful T0/T2/T4 results (T3 is withheld when grain isn't
  # unique). Override per run: --skip-blocked ,REMOVAL,GRAIN
  # or run everything with --run-all. --tables always wins over skipping.
  skip_blocked: [REMOVAL]

# Per-table fields:
#   grain            full composite key, exact case, no surrounding quotes
#   expected_blocked tracker blocked flags (drive skip_blocked)
#   status           informational: not_started | in_progress | completed
#   tenant_join      set false when the table has no client columns
#   exclude_columns  columns removed from comparison entirely (T2/T4 projection
#                    and T3 diff list). Accepts names or {column, reason}.
#   accepted_columns columns still measured in T3 and shown on the dashboard,
#                    but their differences never fail the table (verdict becomes
#                    'PASS (DIFFS ACCEPTED)'). Always give a reason:
#                      accepted_columns:
#                        - column: Job Role Description
#                          reason: HTML stripping differs between pipelines
#                    Optionally add `where` to only accept diffs matching a
#                    specific known pattern, rather than the whole column —
#                    `where` is a SQL predicate written against `prod_value` /
#                    `uat_value` (the column's normalised comparison values,
#                    same ones COUNT_IF diffs on). Any mismatches NOT matching
#                    `where` still count as genuine diffs (still subject to
#                    diff_threshold_pct/FAIL) instead of being blanket-accepted:
#                      accepted_columns:
#                        - column: User Expiry Date
#                          reason: Prod sentinel 1970-01-01 correctly nulled in UAT
#                          where: "prod_value = '1970-01-01 00:00:00+00:00'"
#                        - column: User Has Onboarding Match
#                          reason: NULL now correctly flagged as false in UAT
#                          where: "prod_value IS NULL"
#   accept_diff      manual override, per tier — forces the named tier(s) to
#                    count as ACCEPTED for verdict purposes even when they
#                    genuinely FAIL (never touches ERROR, and never applies
#                    to T0 — schema drift stays a hard stop). Use for an
#                    agreed, documented discrepancy that isn't worth
#                    modelling via accepted_columns/diff_threshold_pct.
#                    Accepting T1 does NOT accept T4 — list only what you
#                    mean:
#                      accept_diff: true            # every tier, T1-T4
#                      accept_diff: T1               # one tier
#                      accept_diff: [T1, T4]          # several tiers
#                      accept_diff:                  # with reasons, recorded
#                        T1: "known grain duplication — approved by X"   # in the table's notes
#                        T4: true
#   workstream       tracker domain grouping
