and noting down the areas of improvement. In future iterations I aim to make sure that those factors that I missed previously are always addressed prior to review.\n", "The majority of my progress on this goal has come through working on the job, and demonstrating improvements on the work I have produced. One key element that I have found helpful is assessing markups of my work and noting down the areas of improvement. In future iterations I aim to make sure that those factors that I missed previously are always addressed prior to review."], [2365, "trafficworks", "SYD", "I believe that I fit all of the above points (excluding site inspections), and beginning to work beyond the level described in certain areas.\u00a0\n", "I believe that I fit all of the above points (excluding site inspections), and beginning to work beyond the level described in certain areas."], [5167, "trafficworks", "SYD", "Noting that the competencies in the field above refers to Engineer / Designer, not Senior Engineer / Designer.Limited opportunity to expand on this competency this past year due to project commitments, keen to restart once again when the opportunity arises.", "Noting that the competencies in the field above refers to Engineer / Designer, not Senior Engineer / Designer. Limited opportunity to expand on this competency this past year due to project commitments, keen to restart once again when the opportunity arises."], [4209, "trafficworks", "SYD", "I have put almost achieves expectations mainly because I haven't seen too many formal RFIs come through to myself. On occasion dealt with a handful of RFIs coming through from EBTA and LX85. In terms of responding, have not used teambinder or followed the formal process, but definitely seen lots of queries that come through on the fly from EBTA, and responding to queries via email or teams. These I have managed and worked on to provide responses and actioned design updates if necessary.Not an RFI but in terms of managing design changes, have picked up DCNs such as Bedford for LX85, and managed this to IFC stage.", "I have put almost achieves expectations mainly because I haven't seen too many formal RFIs come through to myself. On occasion dealt with a handful of RFIs coming through from EBTA and LX85. In terms of responding, have not used teambinder or followed the formal process, but definitely seen lots of queries that come through on the fly from EBTA, and responding to queries via email or teams. These I have managed and worked on to provide responses and actioned design updates if necessary. Not an RFI but in terms of managing design changes, have picked up DCNs such as Bedford for LX85, and managed this to IFC stage."], [2362, "trafficworks", "SYD", "Since setting this goal, I have been able to attend many more meetings, particularly around the LXRP jobs I have been on. This includes the weekly meetings for each LX project, SiDs, IDCs, RSA reviews, and clash detection coordination meetings.\n", "Since setting this goal, I have been able to attend many more meetings, particularly around the LXRP jobs I have been on. This includes the weekly meetings for each LX project, SiDs, IDCs, RSA reviews, and clash detection coordination meetings."], [5166, "trafficworks", "SYD", "Noting that the competencies in the field above refers to Engineer / Designer, not Senior Engineer / Designer.Limited opportunity to participate in project related training of junior staff due to the nature of the projects I am currently involved with. Only in certain instances have I trained other team members, eg. showing how certain lighting calculations or methods were adopted, and explaining how to apply this to other projects or zones of the same project.", "Noting that the competencies in the field above refers to Engineer / Designer, not Senior Engineer / Designer. Limited opportunity to participate in project related training of junior staff due to the nature of the projects I am currently involved with. Only in certain instances have I trained other team members, eg. showing how certain lighting calculations or methods were adopted, and explaining how to apply this to other projects or zones of the same project."], [5163, "trafficworks", "SYD", "Noting that the competencies in the field above refers to Engineer / Designer, not Senior Engineer / Designer.Continuously honing and improving communication skills with colleagues and clients in both written (email/report) and verbal formats (calls/meetings/presentations).", "Noting that the competencies in the field above refers to Engineer / Designer, not Senior Engineer / Designer. Continuously honing and improving communication skills with colleagues and clients in both written (email/report) and verbal formats (calls/meetings/presentations)."], [3396, "trafficworks", "SYD", "Personally feel that there were not as many RFIs as I had envisioned for the LX projects I have seen through to IFC. Through this goal I was hoping to get accustomed to the RFI system and having them assigned to myself. To date, I think they have mostly gone through John as he has been assigned to these.\n", "Personally feel that there were not as many RFIs as I had envisioned for the LX projects I have seen through to IFC. Through this goal I was hoping to get accustomed to the RFI system and having them assigned to myself. To date, I think they have mostly gone through John as he has been assigned to these."], [2367, "trafficworks", "SYD", "I believe my written and verbal communication is strong and I am able to convey my ideas in a concise and coherent manner. I have also enjoyed working with my team and think that we work well together.\n", "I believe my written and verbal communication is strong and I am able to convey my ideas in a concise and coherent manner. I have also enjoyed working with my team and think that we work well together."], [2368, "trafficworks", "SYD", "As mentioned in my goals and competencies, I have had greater interactions through the LX jobs I am currently working on, and have had the opportunity to send emails and present at meetings. Depending on circumstances, I have had to present at meetings without a senior engineer present. Being able to field difficult questions and have a more concrete technical understanding is my next objective.\n", "As mentioned in my goals and competencies, I have had greater interactions through the LX jobs I am currently working on, and have had the opportunity to send emails and present at meetings. Depending on circumstances, I have had to present at meetings without a senior engineer present. Being able to field difficult questions and have a more concrete technical understanding is my next objective."], [3394, "trafficworks", "SYD", "Similar to goal above, have not had too much formal exposure to this area. Have infrequently asked questions or checked in on project performances on T2 out of personal interest/curiosity.\n", "Similar to goal above, have not had too much formal exposure to this area. Have infrequently asked questions or checked in on project performances on T2 out of personal interest/curiosity."], [3395, "trafficworks", "SYD", "Have not had the chance to pick up a medium size project as indicated in note above. Closest would be the independent management of\u00a0post IFC changes for LX projects, in particular Cave Hill or Bedford. Once time commitment towards NELSA decreases, I am looking forward to having more opportunities to manage a project start to finish.\n", "Have not had the chance to pick up a medium size project as indicated in note above. Closest would be the independent management of post IFC changes for LX projects, in particular Cave Hill or Bedford. Once time commitment towards NELSA decreases, I am looking forward to having more opportunities to manage a project start to finish."], [2366, "trafficworks", "SYD", "My interactions with clients and people outside of Trafficworks has definitely increased significantly, and I a fe operating practices, complete pre-start checks, adhere to traffic management rules and remain focused on the task at hand to ensure the safety of myself and others.In my office role, I manage my workload effectively, prioritise tasks, meet deadlines and maintain accurate records and documentation. I take responsibility for my actions, remain reliable and punctual, and work independently with minimal supervision while maintaining a professional attitude at all times.I adapt to changing priorities, remain organised during busy periods and consistently contribute to a productive and positive workplace culture.", "I demonstrate strong self-discipline by consistently following company policies, safety procedures and workplace expectations in both the office and warehouse environments. As a forklift driver, I maintain safe operating practices, complete pre-start checks, adhere to traffic management rules and remain focused on the task at hand to ensure the safety of myself and others. In my office role, I manage my workload effectively, prioritise tasks, meet deadlines and maintain accurate records and documentation. I take responsibility for my actions, remain reliable and punctual, and work independently with minimal supervision while maintaining a professional attitude at all times. I adapt to changing priorities, remain organised during busy periods and consistently contribute to a productive and positive workplace culture."], [1365, "perfection", "SYD", "Manisha is responsible for admin tasks with a primary focus on repacking within our ironbark System, completing up to 400-500 repacks per day. The accuracy of her work helps minimise any stock related issues.\u00a0\nManisha also completes the consoling and daily arrival checks for ZRDC, bringing any discrepancies to the teams attention for them to amend.\nManisha ensures all tasks are completed in a timely fashion.\n", "Manisha is responsible for admin tasks with a primary focus on repacking within our ironbark Sy g needs are as diverse as we are and the catalogue is just one resource. You can then use these as prompts to discuss potential avenues to develop these skills, including - Exploring mentorship options with someone more experienced in the area of interest, Job shadowing a different role to get some first-hand exposure to a new set of practices, Taking on new tasks and assignments that allow you to practice new skills, Identifying training opportunities both internal and external to the orgainsation."], [65156, 143956, "qbcc", "SYD", "We want everyone to feel respected, valued, and able to be themselves at work. Think about how you contribute to this\u2014through your actions, how you work with others, and how you support fairness and inclusion every day.\u00a0Respect & Collaboration \u2013 consistently demonstrating respect through my words, actions, and behaviours, and valuing diverse ideas and perspectives by actively listening to others, especially when opinions differ from my ownSupportive Culture \u2013 support each other, encourage check-ins and wellbeing discussionsBias awareness \u2013 reflect and challenge your own biases, and seek to learn from others\u2019 experiences and backgroundsInclusion through action \u2013 support, participate and engage in initiatives such as cultural events, awareness campaigns, learning opportunities, and discussions with othersCulture of learning \u2013 enrol, participate and engage with learning initiatives around WHS safety practices, psychological safety, cultural and inclusion learning\u00a0Please describe 2-3 actions you will take to support a safe, inclusive, respectful, and supportive workplace.", "We want everyone to feel respected, valued, and able to be themselves at work. Think about how you contribute to this\u2014through your actions, how you work with others, and how you support fairness and inclusion every day. Respect & Collaboration \u2013 consistently demonstrating respect through my words, actions, and behaviours, and valuing diverse ideas and perspectives by actively listening to others, especially when opinions differ from my own Supportive Culture \u2013 support each other, encourage check-ins and wellbeing discussions Bias awareness \u2013 reflect and challenge your own biases, and seek to learn from others\u2019 experiences and backgrounds Inclusion through action \u2013 support, participate and engage in initiatives such as cultural events, awareness campaigns, learning opportunities, and discussions with others Culture of learning \u2013 enrol, participate and engage with learning initiatives around WHS safety practices, psychological safety, cultural and inclusion learning Please describe 2-3 actions you will take to support a safe, inclusive, respectful, and supportive workplace."], [63535, 129773, "qbcc", "SYD", "It is important that we have continuous focus on ensuring our actions and behaviours are aligned with those of our QBCC values.\u00a0\u00a0\nGrowth Mindset is about having a continuous desire to learn, reflecting on where you can improve, and being open to constructive feedback working towards growth. Growth Mindset is not just having a positive attitude or mindset, it is about being intentional about your future growth and taking lessons learnt and applying these practices striving to do better.\u00a0\n\u00a0\n", "It is important that we have continuous focus on ensuring our actions and behaviours are aligned with those of our QBCC values. Growth Mindset is about having a continuous desire to learn, reflecting on where you can improve, and being open to constructive feedback working towards growth. Growth Mindset is not just having a positive attitude or mindset, it is about being intentional about your future growth and taking lessons learnt and applying these practices striving to do better."], [56711, 121476, "qbcc", "SYD", "Our vision is to have a thriving and resilient building and construction industry inspiring confidence, and supporting sustainable social, environmental and economic outcomes for Queenslanders and our purpose is to delivering excellence in regulatory services to reduce risk and offering protection from harm. Describe in your own words the larger purpose of the organisation, and how does the work you do in your current role assist to achieve QBCC\u2019s purpose,..\u00a0\nIf you haven\u2019t already, we suggest you review the QBCC\u2019s Strategic Plan, and consider how the work you do supports the goals and objectives of QBCC. (Both the\u00a0one-page\u00a0or the\u00a0expanded version\u00a0of the Strategic Plan are available from our website).\n", "Our vision is to have a thriving and resilient building and construction industry inspiring confidence, and supporting sustainable social, environmental and economic outcomes for Queenslanders and our purpose is to delivering excellence in regulatory services to reduce risk and offering protection from harm. Describe in your own words the larger purpose of the organisation, and how does the work you do in your current role assist to achieve QBCC&rsquo;s purpose,.. If you haven&rsquo;t already, we suggest you review the QBCC&rsquo;s Strategic Plan, and consider how the work you do supports the goals and objectives of QBCC. (Both the one-page or the expanded version of the Strategic Plan are available from our website)."], [54287, 108787, "qbcc", "SYD", "Having thought about the organisation and your role, what are some concrete steps we can take towards achieving these goals? \nWhen considering your performance goals for the year, visit the\u00a0Learning & Development learning resources page\u00a0on the intranet Trevor for information on SMART goal setting.\n", "Having thought about the organisation and your role, what are some concrete steps we can take towards achieving these goals? When considering your performance goals for the year, visit the Learning & Development learning resources page on the intranet Trevor for information on SMART goal setting."], [70950, 145869, "qbcc", "SYD", "In your own words, how does your work contribute to the success of the QBCC?To help you reflect, consider your contribution through the following three areas, 1) Customer Focus, 2) Regulatory Service & Capability, and 3) Organisational Excellence.\u00a0", "In your own words, how does your work contribute to the success of the QBCC? To help you reflect, consider your contribution through the following three areas, 1) Customer Focus, 2) Regulatory Service & Capability, and 3) Organisational Excellence."], [63658, 125193, "qbcc", "SYD", "Having identified and discussed your strengths that you bring to your role, your team and the QBCC, where do you see your areas of development and growth in the next 12 months, which will help sustain and improve your role performance and your team contribution?\nWe have provided a list below of some initiatives that QBCC currently offer, which could support in planning and achieving your future performance goals, this list is a guide only, you may consider options beyond this list. \n\nInvolvement with new projects\nConsider what development opportunities you could do to assist with your career goals\nExplore possible higher duties that may present throughout the year\u00a0\nSecondments to other divisions/branches\nExplore options of \"day in the life of\"\u00a0(shadowing another role for a day)\nReview QBCC SARAS policy for possible contribution towards any formal studies you may wish to undertake\u00a0\nConsider what development support you may require from your manager\u00a0\nReview the L&OD and Regulatory Academy training calendar to identify future learning courses and opportunities\nExplore possible learning opportunities to further develop complex skills\nSeek out possible learning opportunities to further grow your leadership skills\n\n\u00a0\nWhen setting out goals for development and growth it is important to consider structuring your goals using the SMART method approach. Having r actions and behaviours are aligned with those of our QBCC values.\u00a0\u00a0\nGrowth Mindset is about having a continuous desire to learn, reflecting on where you can improve, and being open to constructive feedback working towards growth. Growth Mindset is not just having a positive attitude or mindset, it is about being intentional about your future growth and taking lessons learnt and applying these practices striving to do better.\u00a0\n\u00a0\n", "It is important that we have continuous focus on ensuring our actions and behaviours are aligned with those of our QBCC values. Growth Mindset is about having a continuous desire to learn, reflecting on where you can improve, and being open to constructive feedback working towards growth. Growth Mindset is not just having a positive attitude or mindset, it is about being intentional about your future growth and taking lessons learnt and applying these practices striving to do better."], [46101, 110775, "qbcc", "SYD", "When looking to learn new skills or achieve a goal, sometimes a little extra help can make all the difference.\nIf you have some specific examples of types of support you would like to receive to achieve your goals (e.g. time, feedback, coaching etc), please list them below.\n", "When looking to learn new skills or achieve a goal, sometimes a little extra help can make all the difference. If you have some specific examples of types of support you would like to receive to achieve your goals (e.g. time, feedback, coaching etc), please list them below."], [63424, 129399, "qbcc", "SYD", "The QBCC Innovate RAP can be found here\nThe QBCC Innovate RAP was endorsed by Reconciliation Australia in October 2023. This is our commitment\u00a0to advance reconciliation and build a diverse workplace by respecting the value of culture, experiences, and rights of Aboriginal and Torres Strait Islander communities. The QBCC's vision for reconciliation is for a building and construction industry that embraces unity between Aboriginal and Torres Strait Islander peoples and other Australians by achieving sustainable social and economic outcomes as part of a thriving and resilient building and construction industry\n", "The QBCC Innovate RAP can be found here The QBCC Innovate RAP was endorsed by Reconciliation Australia in October 2023. This is our commitment to advance reconciliation and build a diverse workplace by respecting the value of culture, experiences, and rights of Aboriginal and Torres Strait Islander communities. The QBCC&#39;s vision for reconciliation is for a building and construction industry that embraces unity between Aboriginal and Torres Strait Islander peoples and other Australians by achieving sustainable social and economic outcomes as part of a thriving and resilient building and construction industry"], [57280, 122640, "qbcc", "SYD", "The QBCC Innovate RAP can be found here\nThe QBCC Innovate RAP was endorsed by Reconciliation Australia in October 2023. This is our commitment\u00a0to advance reconciliation and build a diverse workplace by respecting the value of culture, experiences, and rights of Aboriginal and Torres Strait Islander communities. The QBCC's vision for reconciliation is for a building and construction industry that embraces unity between Aboriginal and Torres Strait Islander peoples and other Australians by achieving sustainable social and economic outcomes as part of a thriving and resilient building and construction industry\n", "The QBCC Innovate RAP can be found here The QBCC Innovate RAP was endorsed by Reconciliation Australia in October 2023. This is our commitment to advance reconciliation and build a diverse workplace by respecting the value of culture, experiences, and rights of Aboriginal and Torres Strait Islander communities. The QBCC&#39;s vision for reconciliation is for a building and construction industry that embraces unity between Aboriginal and Torres Strait Islander peoples and other Australians by achieving sustainable social and economic outcomes as part of a thriving and resilient building and construction industry"]], "Question Answer": [[1940, 4608, "wha", "SYD", "- Work to improve WHA assessor skill set to bring more assessment types in-house within the next 12 months.\n", "- Work to improve WHA assessor skill set to bring more assessment types in-house within the next 12 months."], [508, 2088, "wha", "SYD", "Most satisfaction- getting sign off up to date and schedules all actioned \nLeast satisfaction- doing tasks that take up time or double ups for example uploading using Ratify portal or chase Serology results after a booking has been signed off", "Most satisfaction- getting sign off up to date and schedules all actioned Least satisfaction- doing tasks that take up time or double ups for example uploading using Ratify portal or chase Serology results after a booking has been signed off"], [788, 1818, "wha", "SYD", "Most satisfaction\nAs mentioned above, I enjoyed learning new things, master new technologies. Experience in Quescreen broaden my mind. The more I learn, The more flexibility I become.\n\nThe least\nI think the current and working environment, work process and team atmosphere are all very ideal. I can't think of any dissatisfaction at the moment.", "Most satisfaction As mentioned above, I enjoyed learning new things, master new technologies. Experience in Quescreen broaden my mind. The more I learn, The more flexibility I become. The least I think the current and working environment, work process and team atmosphere are all very ideal. I can't think of any dissatisfaction at the moment."], [1634, 4551, "wha", "SYD", "- Participate and complete the leadership academy\n- Foster professional growth of the team through performance reviews and skills development\n- Improve stakeholder communication with a more robust deployment pipeline, detailed notes of ongoing projects and new releases", "- Participate and complete the leadership academy - Foster professional gro g and using different technology very easily.  Jeremy was able to bounce between Quescreen and WHA development without any issues, whereas other developers would not find it so easy to do.", "Jeremy has a unique ability of adapting to different styles of programming and using different technology very easily. Jeremy was able to bounce between Quescreen and WHA development without any issues, whereas other developers would not find it so easy to do."], [994, 3355, "wha", "SYD", "Feedback given about Break time. \nMore mindful Space for staff at work away from desk to stretch and eat. \nImprove work environment - Encourage healthy lifestyle - E.g Gym memebership under benefits in Elmo.", "Feedback given about Break time. More mindful Space for staff at work away from desk to stretch and eat. Improve work environment - Encourage healthy lifestyle - E.g Gym memebership under benefits in Elmo."], [469, 2352, "wha", "SYD", "Being trained for sign-off and advanced sign-off work. \nDoing two days of admin duties. \nBeing able to complete the warden training.", "Being trained for sign-off and advanced sign-off work. Doing two days of admin duties. Being able to complete the warden training."], [1123, 3708, "wha", "SYD", "Working hard to maintain the accuracy and timelessness of routine work such as a high number of assessments has been sitting in the sign-off pool.\n\nSometimes, I find it confusing on the requirements for assessments as I am not sure and worry about making errors during sign-off. e.g. assessments related to health monitoring or those that are less frequently encountered can sometimes be less straightforward. I'm trying to address these and improve my understanding of assessment requirements to minimize any potential errors during sign-off.", "Working hard to maintain the accuracy and timelessness of routine work such as a high number of assessments has been sitting in the sign-off pool. Sometimes, I find it confusing on the requirements for assessments as I const TIERS = ["T0","T1","T2","T3","T4"];
const TEST_LABELS = {T0:"Schema parity",T1:"Grain uniqueness",
  T2:"Key set & full-row EXCEPT (both directions)",T3:"Column-level diff on shared keys",T4:"Aggregate fingerprint"};
const state = { run: RUNS.length-1, filter: "all", q: "" };

const vkey = v => !v ? "none" : v==="PASS" ? "PASS" : v==="BLOCKED" ? "BLOCKED"
  : v.startsWith("PASS (") ? "ACC"
  : v.startsWith("T0") ? "T0" : v==="ERROR" ? "ERROR" : "DIFFS";
const vlabel = {PASS:"Pass",ACC:"Pass · diffs accepted",DIFFS:"Diffs found",BLOCKED:"Blocked",ERROR:"Error",T0:"T0 drift",none:"—"};
const vcolor = {PASS:"var(--pass)",ACC:"var(--acc)",DIFFS:"var(--fail)",BLOCKED:"var(--blocked)",ERROR:"var(--err)",T0:"var(--err)",none:"var(--line-soft)"};
const fmt = n => n==null ? "–" : Number(n).toLocaleString("en-AU");
const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const anchor = t => "t-" + String(t).replace(/[^A-Za-z0-9_]/g,"_");

const tierStatus = (r,t) => { const x=(r.tiers||{})[t]; return x ? x.status : "none"; };
const pct = (n,d) => (d && n!=null) ? (100*Number(n)/Number(d)).toFixed(3).replace(/\.?0+$/,"")+"%" : null;
function thresholdVerdict(tier, worst, denom){
  if (tier.accepted_via_config)
    return ` <b>Accepted via config override</b>${tier.accept_reason?` — ${esc(tier.accept_reason)}`:""}.`;
  if (!tier.threshold_pct || !denom) return "";
  const p = 100*worst/denom;
  return p<=tier.threshold_pct
    ? ` <b>Within the accepted threshold</b> (worst ${pct(worst,denom)} ≤ ${tier.threshold_pct}%).`
    : ` <b>Exceeds the ${tier.threshold_pct}% threshold</b> (worst ${pct(worst,denom)}).`;
}

const renderValue = v => v==null ? "NULL" : typeof v==="boolean" ? String(v)
  : String(v).length>120 ? String(v).slice(0,120)+"…" : String(v);

/* ---------- shared components ---------- */

function stat(label, prodVal, uatVal, delta){
  const dcell = delta==null ? "" :
    `<span class="d ${Number(delta)===0?"ok":"bad"}"><i>Δ</i>${(delta>0?"+":"")+fmt(delta)}</span>`;
  return `<div><div class="statlabel">${esc(label)}</div><div class="stat">
    <span class="p"><i>PROD</i>${fmt(prodVal)}</span>
    <span class="u"><i>UAT</i>${fmt(uatVal)}</span>${dcell}</div></div>`;
}

function dataTable(cols, rowsArr){
  return `<div class="table-wrap"><table class="data"><thead><tr>${
    cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr></thead><tbody>${
    rowsArr.map(row=>`<tr>${row.join("")}</tr>`).join("")}</tbody></table></div>`;
}

const VISIBLE_SAMPLE_ROWS = 10;
function toggleRows(btn){
  const tbl = btn.parentElement.querySelector("table.data");
  const open = tbl.classList.toggle("xopen");
  btn.textContent = open ? "Show first "+VISIBLE_SAMPLE_ROWS : btn.dataset.all;
}
function sampleTable(title, columns, rowsArr, maxRows=Infinity, maxDataCols=4){
  const rowsAll = (rowsArr||[]).slice(0, maxRows);
  if (!rowsAll.length) return "";
  const cols = (columns||[]).length ? columns : rowsAll[0].map((_,i)=>`col${i+1}`);
  const isClient = c => /^client_(name|region)$/i.test(String(c));
  const keep = new Set();
  cols.forEach((c,i)=>{ if(isClient(c)) keep.add(i); });
  let taken = 0;
  cols.forEach((c,i)=>{ if(!isClient(c) && taken<maxDataCols){ keep.add(i); taken++; } });
  const idx = [...keep].sort((a,b)=>a-b);
  const body = rowsAll.map((row,ri)=>`<tr${ri>=VISIBLE_SAMPLE_ROWS?' class="xrow"':""}>${
    idx.map(i=>`<td>${esc(renderValue(row[i]))}</td>`).join("")}</tr>`).join("");
  const toggle = rowsAll.length>VISIBLE_SAMPLE_ROWS
    ? `<button class="xtoggle" data-all="Show all ${rowsAll.length} rows" onclick="toggleRows(this)">Show all ${rowsAll.length} rows</button>` : "";
  return `<div><div class="statlabel">${esc(title)}${cols.length>idx.length?` (${idx.length} of ${cols.length} columns)`:""}${
    rowsAll.length>VISIBLE_SAMPLE_ROWS?` — showing ${VISIBLE_SAMPLE_ROWS} of ${rowsAll.length}`:""}</div>
    <div class="table-wrap"><table class="data"><thead><tr>${idx.map(i=>`<th>${esc(cols[i])}</th>`).join("")}</tr></thead><tbody>${body}</tbody></table></div>${toggle}</div>`;
}

function sqlBlocks(tier){
  const qs = Array.isArray(tier.queries) ? tier.queries : tier.sql ? [tier.sql] : [];
  return qs.map((s,i)=>`<div class="sql"><div class="sql-hd"><b>Query${qs.length>1?" "+(i+1):""}</b>
    <button class="copy" data-sql="${esc(s)}">Copy</button></div><pre>${esc(s)}</pre></div>`).join("");
}

/* ---------- per-tier plain-language summary ---------- */

function tierSummary(key, tier){
  const st = tier.status;
  if (st==="ERROR") return `Query failed — see error below.`;
  const accSuffix = st==="ACCEPTED" && tier.threshold_pct
    ? ` <b>Within the accepted threshold (≤${tier.threshold_pct}%).</b>` : "";
  if (st==="SKIPPED") return esc(tier.reason || "Skipped.");
  if (st==="DRY") return "Dry run — SQL generated, not executed.";
  if (key==="T0"){
    const n=(tier.drift||[]).length;
    return n ? `<b>${n} column${n>1?"s":""} drifted</b> between PROD and UAT — everything below this tier is unreliable until schemas agree.` : "Schemas match exactly (names, order, types).";
  }
  if (key==="T1"){
    if (!tier.dups) return "No detail recorded.";
    if (tier.grain_unique) return "Grain is unique on both sides.";
    const pd=(tier.dups?.prod||{}).dup_key_count||0, ud=(tier.dups?.uat||{}).dup_key_count||0;
    const dupTxt = `<b>Grain is NOT unique</b> — PROD ${fmt(pd)} / UAT ${fmt(ud)} duplicate grain keys`;
    const tv = thresholdVerdict(tier, Math.max(pd,ud), tier.denominator);
    return st==="ACCEPTED" ? `${dupTxt} — key-based tests proceed with minor fan-out risk.${tv}`
      : `${dupTxt}; key-based tests (T2 key set, T3) are unreliable.${tv}`;
  }
  if (key==="T2"){
    if (!tier.counts && !tier.key_diff) return "No difference counts recorded.";
    const parts=[];
    const d = tier.denominator;
    let worst = 0;
    if (tier.key_diff){
      const kp=tier.key_diff.in_prod_not_uat||0, ku=tier.key_diff.in_uat_not_prod||0;
      worst = Math.max(worst, kp, ku);
      parts.push((kp===0&&ku===0) ? "Key sets are identical."
        : `Keys: <b>${fmt(kp)}</b>${d?` (${pct(kp,d)})`:""} exist only in PROD, <b>${fmt(ku)}</b>${d?` (${pct(ku,d)})`:""} only in UAT.`);
    }
    if (tier.counts){
      const p=tier.counts.in_prod_not_uat||0, u=tier.counts.in_uat_not_prod||0;
      worst = Math.max(worst, p, u);
      const scope = tier.rows_scope==="shared_keys" ? " Content diff measured on shared keys only — one-sided keys are excluded here and counted above." : "";
      parts.push((p===0&&u===0) ? "Row sets are identical under the normalised projection." + scope
        : `Rows: <b>${fmt(p)}</b>${d?` (${pct(p,d)})`:""} appear only in PROD, <b>${fmt(u)}</b>${d?` (${pct(u,d)})`:""} only in UAT (after blank/NULL normalisation).${scope}`);
    } else if (tier.full_row_check){
      parts.push(`Full-row EXCEPT ${esc(tier.full_row_check)}.`);
    }
    return parts.join(" ") + (worst?thresholdVerdict(tier, worst, d):"");
  }
  if (key==="T3"){
    const mc=tier.mismatched_columns||{}; const n=Object.keys(mc).length;
    if (!n) return tier.reason ? esc(tier.reason) : "No column-level mismatches across shared keys.";
    const cs=tier.column_status||{};
    const failing=Object.keys(mc).filter(c=>(cs[c]||"FAIL")==="FAIL").length;
    const accepted=n-failing;
    const worst=Object.entries(mc).sort((a,b)=>b[1]-a[1])[0];
    let txt=`<b>${n} column${n>1?"s":""} disagree</b> across ${fmt(tier.shared_keys)} shared keys — worst: <b>${esc(worst[0])}</b> (${fmt(worst[1])} keys).`;
    if (accepted) txt += ` ${failing?`<b>${failing}</b> failing, `:""}<b>${accepted}</b> accepted (marked or within threshold).`;
    if (tier.accepted_via_config) txt += ` <b>Tier accepted via config override</b>${tier.accept_reason?` — ${esc(tier.accept_reason)}`:""}.`;
    return txt;
  }
  if (key==="T4"){
    if (tier.accepted_via_config) return `<b>Fingerprints differ</b> — accepted via config override${tier.accept_reason?`: ${esc(tier.accept_reason)}`:""}.`;
    if (st==="PASS") return "HASH_AGG fingerprints match — the two sets are identical under the normalised projection.";
    if (st==="FAIL") return "<b>Fingerprints differ</b> — the sets are not identical.";
    return esc(tier.reason || "No fingerprint result recorded.");
  }
  return "";
}

/* ---------- per-tier body detail ---------- */

function tierBody(key, tier){
  const parts=[];
  if (key==="T0" && (tier.drift||[]).length){
    parts.push(dataTable(["Column","PROD pos/type","UAT pos/type"],
      tier.drift.map(d=>[`<td>${esc(d.column??"—")}</td>`,
        `<td>${esc(d.prod_ord??"—")} / ${esc(d.prod_type??"—")}</td>`,
        `<td>${esc(d.uat_ord??"—")} / ${esc(d.uat_type??"—")}</td>`])));
  }
  if (key==="T1" && tier.dups){
    const d=tier.dups||{};
    parts.push(`<div class="statrow">
      ${stat("Duplicate grain keys", (d.prod||{}).dup_key_count, (d.uat||{}).dup_key_count, null)}</div>`);
    if (tier.sample_rows){
      const label={prod:"Duplicate grain keys in PROD (worst first)",uat:"Duplicate grain keys in UAT (worst first)"};
      const blocks = Object.entries(tier.sample_rows).map(([env,rows]) =>
        sampleTable(label[env]||env, tier.sample_columns, rows)).filter(Boolean);
      if (blocks.length) parts.push(`<div class="samples">${blocks.join("")}</div>`);
    }
  }
  if (key==="T2" && ("prod_rows" in tier || tier.counts || tier.key_diff)){
    if ("prod_rows" in tier)
      parts.push(`<div class="statrow">${stat("Rows (active tenants)", tier.prod_rows, tier.uat_rows, tier.row_diff)}</div>`);
    if (tier.row_count_breakdown && tier.row_count_breakdown.length)
      parts.push(sampleTable(`Per-client contribution to the difference (worst first)`,
        tier.row_count_breakdown_columns, tier.row_count_breakdown, Infinity, 5));
    const statBits=[];
    if (tier.key_diff) statBits.push(stat("Grain keys only on one side",
      tier.key_diff.in_prod_not_uat, tier.key_diff.in_uat_not_prod, null));
    if (tier.counts) statBits.push(stat("Full rows only on one side",
      tier.counts.in_prod_not_uat, tier.counts.in_uat_not_prod, null));
    if (statBits.length) parts.push(`<div class="statrow">${statBits.join("")}</div>`);
    if (tier.full_row_check && !tier.counts)
      parts.push(`<div class="kv"><span>Full-row EXCEPT ${esc(tier.full_row_check)}.</span></div>`);
    if (tier.key_samples){
      const blocks = Object.entries(tier.key_samples).map(([dir,rows]) =>
        sampleTable(dir==="in_prod_not_uat"?"Sample keys only in PROD":"Sample keys only in UAT",
          tier.key_columns, rows)).filter(Boolean);
      if (blocks.length) parts.push(`<div class="samples">${blocks.join("")}</div>`);
    }
    if (tier.samples){
      const blocks = Object.entries(tier.samples).map(([dir,rows]) =>
        sampleTable(dir==="in_prod_not_uat"?"Sample full rows only in PROD":"Sample full rows only in UAT",
          tier.sample_columns, rows)).filter(Boolean);
      if (blocks.length) parts.push(`<div class="samples">${blocks.join("")}</div>`);
    }
  }
  if (key==="T3" && tier.mismatched_columns && Object.keys(tier.mismatched_columns).length){
    const total=Number(tier.shared_keys||0);
    const residualMap = tier.residual_mismatches||{};
    // where-filtered (flagged) columns first — same priority the backend
    // uses to pick which columns get sample rows — then the rest by raw count.
    const order=Object.entries(tier.mismatched_columns).sort((a,b)=>{
      const aw = a[0] in residualMap, bw = b[0] in residualMap;
      if (aw !== bw) return aw ? -1 : 1;
      if (aw && bw) return residualMap[b[0]] - residualMap[a[0]];
      return b[1]-a[1];
    });
    parts.push(`<div class="kv"><span>shared keys:</span> ${fmt(total)}${
      tier.column_samples_note?`&ensp;<span>· ${esc(tier.column_samples_note)}</span>`:""}</div>`);
    if (!tier.column_samples)
      parts.push(`<div class="kv"><span>No per-column examples in this run's results — re-run with the latest runner.py to capture side-by-side PROD/UAT examples for each column.</span></div>`);
    const sampCols = tier.column_sample_columns || [];
    const isP = c => /^prod[ _]value$/i.test(String(c));
    const isU = c => /^uat[ _]value$/i.test(String(c));
    parts.push(order.map(([c,nMis])=>{
      const pct = total ? (100*Number(nMis)/total).toFixed(2) : "0.00";
      let body = "";
      const rowsArr = (tier.column_samples||{})[c];
      if (rowsArr && rowsArr.length){
        body = `<div class="table-wrap"><table class="data"><thead><tr>${
          sampCols.map(cc=>`<th${isP(cc)?' class="thp"':isU(cc)?' class="thu"':""}>${esc(cc)}</th>`).join("")
        }</tr></thead><tbody>${
          rowsArr.slice(0,8).map(row=>`<tr>${row.map((v,i)=>{
            const cc=sampCols[i]||"";
            if (isP(cc)||isU(cc))
              return `<td class="${isP(cc)?"tdp":"tdu"}"><div class="val" title="${esc(renderValue(v))}">${esc(renderValue(v))}</div></td>`;
            return `<td>${esc(renderValue(v))}</td>`;
          }).join("")}</tr>`).join("")}</tbody></table></div>`;
      } else if (tier.column_samples && !(c in tier.column_samples)){
        body = `<div class="kv"><span>Not sampled this run — outside the top columns captured (see note above).</span></div>`;
      }
      const cst=(tier.column_status||{})[c]||"FAIL";
      const badge = cst==="FAIL" ? `<span class="colbadge fail">fail</span>`
        : cst==="ACCEPTED_THRESHOLD" ? `<span class="colbadge acc">accepted · within threshold</span>`
        : `<span class="colbadge acc">accepted · marked</span>`;
      const reason=(tier.accepted_reasons||{})[c];
      const whereSql=(tier.accepted_where||{})[c];
      return `<div class="t4col"><div class="t4col-hd"><b>${esc(c)}</b>
        <span>${fmt(nMis)} of ${fmt(total)} shared keys differ (${pct}%)</span>${badge}${
        reason?`<span>— ${esc(reason)}</span>`:""}</div>${
        whereSql?`<div class="wherebox"><span>accepted where:</span><code>${esc(whereSql)}</code></div>`:""}${body}</div>`;
    }).join(""));
  }
  if (tier.error) parts.push(`<div class="errbox">${esc(tier.error)}</div>`);
  const sql = sqlBlocks(tier);
  if (sql) parts.push(sql);
  return parts.join("");
}

/* T2's label depends on which mode it ran in — key-presence-only (T3 covers
   content), keyed fallback (key set + full-row EXCEPT), or keyless. */
function tierLabel(key, tier){
  if (key==="T2"){
    if (tier.full_row_check) return "Key-set diff (content drift covered by T3)";
    if (tier.key_diff && tier.counts) return "Key set & full-row EXCEPT (shared keys)";
    if (tier.counts) return "Full-row EXCEPT (keyless — no grain configured)";
  }
  return TEST_LABELS[key];
}

function tierCard(key, tier){
  const st=(tier.status||"none").toLowerCase();
  // skipped tiers: visible but one quiet line — nothing else to show
  if ((st==="skipped"||st==="none") && !tier.error && !tier.sql && !tier.queries)
    return `<div class="tier line ${st}"><span class="tk">${key}</span>
      <span>${esc(tierLabel(key,tier))} — skipped${tier.reason?` · ${esc(tier.reason)}`:""}</span></div>`;
  const overrideBadge = tier.accepted_via_config
    ? `<span class="tier-badge accepted" title="${tier.accept_reason?esc(tier.accept_reason):'accept_diff config override'}">config override</span>` : "";
  return `<div class="tier ${st}">
    <div class="tier-hd"><span class="tk">${key}</span><span class="tl">${esc(tierLabel(key,tier))}</span>
      <span class="spacer"></span>${overrideBadge}<span class="tier-badge ${st}">${esc(tier.status||"none")}</span></div>
    <div class="tier-sum">${tierSummary(key,tier)}</div>
    <div class="tier-bd">${tierBody(key,tier)}</div>
  </div>`;
}

/* ---------- page assembly ---------- */

function kpis(run){
  const c={PASS:0,ACC:0,DIFFS:0,BLOCKED:0,ERROR:0,T0:0,none:0};
  run.results.forEach(r=>c[vkey(r.verdict)]++);
  document.getElementById("kpis").innerHTML=`
    <div class="kpi"><div class="n">${run.results.length}</div><div class="l">Tables tested</div></div>
    <div class="kpi pass"><div class="n">${c.PASS}</div><div class="l">Pass</div></div>
    <div class="kpi acc"><div class="n">${c.ACC}</div><div class="l">Diffs accepted</div></div>
    <div class="kpi fail"><div class="n">${c.DIFFS}</div><div class="l">Diffs found</div></div>
    <div class="kpi blocked"><div class="n">${c.BLOCKED}</div><div class="l">Blocked</div></div>
    <div class="kpi err"><div class="n">${c.ERROR+c.T0}</div><div class="l">Error / drift</div></div>`;
  document.getElementById("spectrum").innerHTML = run.results.map(r=>
    `<a href="#${anchor(r.table)}" style="background:${vcolor[vkey(r.verdict)]}" title="${esc(r.table)} — ${vlabel[vkey(r.verdict)]}"></a>`).join("");
}

function visible(run){
  const q=state.q.toLowerCase();
  return run.results.filter(r=>
    (state.filter==="all"||vkey(r.verdict)===state.filter) && r.table.toLowerCase().includes(q));
}

function rows(run){
  const el=document.getElementById("rows");
  const vis=visible(run);
  if(!vis.length){ el.innerHTML=`<div class="empty">No tables match — clear the filter or search.</div>`; return; }
  el.innerHTML=vis.map(r=>{
    const vk=vkey(r.verdict);
    return `<a class="trow" href="#${anchor(r.table)}">
      <span class="tname">${esc(r.table)}</span>
      ${TIERS.map(k=>`<span class="cell ${tierStatus(r,k)}" title="${k}: ${tierStatus(r,k)}"></span>`).join("")}
      <span class="verdict v-${vk}">${vlabel[vk]}</span></a>`;
  }).join("");
}

function sections(run){
  const el=document.getElementById("sections");
  const vis=visible(run);
  if(!vis.length){ el.innerHTML=`<div class="empty">No tables match — clear the filter or search.</div>`; return; }
  el.innerHTML=vis.map(r=>{
    const vk=vkey(r.verdict);
    const rt=r.runtime_seconds!=null?`${Number(r.runtime_seconds).toFixed(1)}s`:null;
    return `<section class="tsection" id="${anchor(r.table)}">
      <div class="thd">
        <span class="tname">${esc(r.table)}</span>
        <span class="verdict v-${vk}">${vlabel[vk]}</span>
        ${rt?`<span class="meta">runtime ${rt}</span>`:""}
        ${r.review_required?`<span class="badge review">review required</span>`:""}
        ${(r.expected_blocked||[]).map(b=>`<span class="badge">expected: ${esc(b)}</span>`).join("")}
        ${r.excluded_columns?`<span class="badge" title="${esc(Object.entries(r.excluded_columns).map(([c,x])=>c+(x?": "+x:"")).join("; "))}">${Object.keys(r.excluded_columns).length} column(s) excluded</span>`:""}
        ${r.accepted_columns?`<span class="badge review" style="background:var(--acc-bg);color:var(--acc)" title="${esc(Object.entries(r.accepted_columns).map(([c,x])=>c+(x?": "+x:"")).join("; "))}">${Object.keys(r.accepted_columns).length} column(s) accepted</span>`:""}
        <span class="spacer"></span>
        <span class="meta"><a href="#top" onclick="window.scrollTo({top:0});return false;">↑ summary</a></span>
      </div>
      <div class="tbody">
        ${TIERS.map(k=>tierCard(k,(r.tiers||{})[k]||{})).join("")}
        ${(r.notes&&r.notes.length)?`<div><div class="statlabel">Notes</div><ul class="notes">${r.notes.map(n=>`<li>${esc(n)}</li>`).join("")}</ul></div>`:""}
      </div>
    </section>`;
  }).join("");
  el.querySelectorAll(".copy").forEach(b=>b.addEventListener("click",()=>{
    if(navigator.clipboard) navigator.clipboard.writeText(b.dataset.sql).then(()=>{
      b.textContent="Copied"; setTimeout(()=>b.textContent="Copy",1200);
    });
  }));
}

function history(){
  const el=document.getElementById("hist");
  const tables=[...new Set(RUNS.flatMap(r=>r.results.map(x=>x.table)))].sort();
  el.style.gridTemplateColumns=`minmax(220px,320px) repeat(${RUNS.length}, minmax(34px,60px))`;
  let h=`<div></div>`+RUNS.map(r=>`<div class="hhead" title="${esc(r.label)}">${esc(r.label.split(",")[0])}</div>`).join("");
  for(const t of tables){
    h+=`<div class="hname" title="${esc(t)}">${esc(t)}</div>`;
    for(const run of RUNS){
      const rec=run.results.find(x=>x.table===t);
      const vk=rec?vkey(rec.verdict):"none";
      h+=`<div class="hcell ${vk}" title="${esc(t)} · ${esc(run.label)} — ${vlabel[vk]}"></div>`;
    }
  }
  el.innerHTML=h;
}

function boot(){
  const sel=document.getElementById("runSel");
  sel.innerHTML=RUNS.map((r,i)=>`<option value="${i}" ${i===state.run?"selected":""}>${esc(r.label)}</option>`).join("");
  sel.addEventListener("change",e=>{state.run=+e.target.value;render();});
  document.getElementById("search").addEventListener("input",e=>{state.q=e.target.value;rows(RUNS[state.run]);sections(RUNS[state.run]);});
  document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
    state.filter=c.dataset.f;
    document.querySelectorAll(".chip").forEach(x=>x.setAttribute("aria-pressed",x===c?"true":"false"));
    rows(RUNS[state.run]);sections(RUNS[state.run]);
  }));
  document.getElementById("foot").textContent=
    `${RUNS.length} run(s) · generated ${new Date().toLocaleString("en-AU")} · dashboard.py · print (Ctrl+P) for a PDF export`;
  history();render();
}
function exportHtml(){
  const blob = new Blob(["<!DOCTYPE html>\n"+document.documentElement.outerHTML],
    {type:"text/html"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "kafka_migration_dashboard.html";
  a.click(); URL.revokeObjectURL(a.href);
}
function render(){const run=RUNS[state.run];kpis(run);rows(run);sections(run);}
boot();
</script>
</body>
</html>
