<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kafka Migration — Test Ladder</title>
<style>
:root{
  --paper:#F2F4F6; --card:#FFFFFF; --ink:#17222C; --ink-soft:#5A6B79;
  --line:#DDE3E8; --line-soft:#EBEFF2;
  --pass:#1E7A4E; --pass-bg:#E2F2E9;
  --fail:#C13A3F; --fail-bg:#FAE7E7;
  --blocked:#A87715; --blocked-bg:#F8EFDA;
  --skip:#8A97A1; --skip-bg:#EDF0F3;
  --err:#8348B5; --err-bg:#F0E7F9;
  --acc:#0B6E8F; --acc-bg:#E1F0F6;
  --prod:#2F4B7C; --uat:#0D7E83;
  --mono:"Cascadia Mono","Cascadia Code",ui-monospace,"JetBrains Mono",Consolas,monospace;
  --sans:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font:15px/1.5 var(--sans);padding:0 0 90px}
a{color:inherit;text-decoration:none}
.wrap{width:100%;max-width:1240px;margin:0 auto;padding:0 26px}

/* masthead */
header{border-bottom:1px solid var(--line);background:var(--card);position:sticky;top:0;z-index:5}
.mast{display:flex;align-items:baseline;gap:18px;padding:15px 0;flex-wrap:wrap}
.mast h1{font-size:17px;font-weight:650}
.mast .sub{font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
.mast .spacer{flex:1}
select,input[type=search]{font:13px var(--mono);color:var(--ink);background:var(--card);
  border:1px solid var(--line);border-radius:6px;padding:7px 10px}
select{cursor:pointer}
:focus-visible{outline:2px solid var(--prod);outline-offset:2px}

/* KPI band + spectrum */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:26px 0 8px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:13px 16px}
.kpi .n{font:600 29px/1.1 var(--mono)}
.kpi .l{font-size:12px;color:var(--ink-soft);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.kpi.pass .n{color:var(--pass)} .kpi.fail .n{color:var(--fail)}
.kpi.blocked .n{color:var(--blocked)} .kpi.err .n{color:var(--err)}
.kpi.acc .n{color:var(--acc)}
.spectrum{display:flex;gap:3px;margin:14px 0 8px;height:10px}
.spectrum a{flex:1;border-radius:2px}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);margin:0 0 26px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:-1px}

/* controls (screen only) */
.controls{display:flex;gap:10px;margin:0 0 14px;flex-wrap:wrap;align-items:center}
.chip{font:12px var(--sans);border:1px solid var(--line);background:var(--card);border-radius:99px;
  padding:5px 12px;cursor:pointer;color:var(--ink-soft)}
.chip[aria-pressed="true"]{border-color:var(--ink);color:var(--ink);font-weight:600}

/* summary board */
.board{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:44px}
.thead,.trow{display:grid;grid-template-columns:minmax(280px,1fr) repeat(5,52px) 150px;align-items:center}
.thead{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);
  border-bottom:1px solid var(--line);padding:10px 16px}
.thead div{text-align:center}.thead div:first-child{text-align:left}.thead div:last-child{text-align:right}
.trow{padding:10px 16px;border-bottom:1px solid var(--line-soft)}
.trow:last-child{border-bottom:none}
.trow:hover{background:#F8FAFB}
.trow .tname{font-family:var(--mono);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:12px}
.cell{height:20px;margin:0 3px;border-radius:4px}
.cell.PASS{background:var(--pass)} .cell.FAIL{background:var(--fail)}
.cell.SKIPPED{background:var(--skip-bg);border:1px dashed var(--line)}
.cell.ERROR{background:var(--err)}
.cell.ACCEPTED{background:var(--acc)}
.cell.DRY{background:repeating-linear-gradient(45deg,#cfd6db 0 4px,#e6eaee 4px 8px)}
.cell.none{background:transparent}
.verdict{justify-self:end;font:600 11px var(--sans);letter-spacing:.05em;border-radius:99px;
  padding:4px 11px;text-transform:uppercase;white-space:nowrap}
.v-PASS{background:var(--pass-bg);color:var(--pass)}
.v-DIFFS{background:var(--fail-bg);color:var(--fail)}
.v-BLOCKED{background:var(--blocked-bg);color:var(--blocked)}
.v-ERROR,.v-T0{background:var(--err-bg);color:var(--err)}
.v-ACC{background:var(--acc-bg);color:var(--acc)}

/* per-table report sections */
h2.sect{font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin:44px 0 12px}
.tsection{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:0 0 22px;overflow:hidden}
.tsection > .thd{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 18px;
  border-bottom:1px solid var(--line);background:#FBFCFD}
.thd .tname{font:600 15px var(--mono)}
.thd .meta{font:12px var(--mono);color:var(--ink-soft)}
.thd .spacer{flex:1}
.badge{font:600 11px var(--sans);background:var(--blocked-bg);color:var(--blocked);border-radius:99px;padding:4px 10px}
.badge.review{background:var(--err-bg);color:var(--err)}
.tbody{padding:16px 18px;display:grid;gap:12px}

/* tier cards — status colors the left edge */
.tier{border:1px solid var(--line-soft);border-left-width:4px;border-radius:10px;background:var(--card);min-width:0;overflow:hidden}
.tier.pass{border-left-color:var(--pass)} .tier.fail{border-left-color:var(--fail)}
.tier.error{border-left-color:var(--err)}
.tier.accepted{border-left-color:var(--acc)} .tier.skipped,.tier.none{border-left-color:var(--line)}
.tier.dry{border-left-color:var(--prod)}
.tier-hd{display:flex;align-items:baseline;gap:12px;padding:10px 14px 0;flex-wrap:wrap}
.tier-hd .tk{font:600 13px var(--mono)}
.tier-hd .tl{font-size:13px;color:var(--ink-soft)}
.tier-hd .spacer{flex:1}
.tier-badge{font:600 10.5px var(--sans);padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.04em}
.tier-badge.pass{background:var(--pass-bg);color:var(--pass)}
.tier-badge.fail{background:var(--fail-bg);color:var(--fail)}
.tier-badge.error{background:var(--err-bg);color:var(--err)}
.tier-badge.accepted{background:var(--acc-bg);color:var(--acc)}
.tier-badge.skipped,.tier-badge.none{background:var(--skip-bg);color:var(--ink-soft)}
.tier-badge.dry{background:#E9F2FF;color:var(--prod)}
.tier-sum{padding:6px 14px 0;font-size:13.5px}
.tier-sum b{font-weight:600}
.tier-bd{padding:10px 14px 12px;display:grid;gap:10px;min-width:0}
.tier-bd > *{min-width:0;max-width:100%}
.tbody{min-width:0}
.tbody > *{min-width:0}
/* compact single-line form for skipped tiers — visible, just quiet */
.tier.line{display:flex;align-items:center;gap:12px;padding:8px 14px;color:var(--ink-soft);font-size:13px}
.tier.line .tk{font:600 12.5px var(--mono);color:var(--ink-soft)}

/* the one consistent PROD/UAT/Δ component */
.stat{display:inline-grid;grid-template-columns:auto auto auto;gap:0;border:1px solid var(--line-soft);
  border-radius:8px;overflow:hidden;font-family:var(--mono);font-size:13px}
.stat > span{padding:7px 14px;display:flex;flex-direction:column;gap:1px}
.stat i{font:600 10px var(--sans);font-style:normal;text-transform:uppercase;letter-spacing:.07em}
.stat .p{background:#F4F6FA} .stat .p i{color:var(--prod)}
.stat .u{background:#F2F8F8;border-left:1px solid var(--line-soft)} .stat .u i{color:var(--uat)}
.stat .d{border-left:1px solid var(--line-soft)} .stat .d i{color:var(--ink-soft)}
.stat .d.bad{background:var(--fail-bg);color:var(--fail)}
.stat .d.ok{background:var(--pass-bg);color:var(--pass)}
.statrow{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start}
.statlabel{font:600 11px var(--sans);text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:4px}

/* tables (schema drift, samples, T3) */
.table-wrap{overflow:auto;border:1px solid var(--line-soft);border-radius:8px;width:fit-content;max-width:100%}
table.data{border-collapse:collapse;font-size:12px;font-family:var(--mono)}
table.data th,table.data td{padding:6px 12px;border-bottom:1px solid var(--line-soft);text-align:left;white-space:nowrap}
table.data th{font:600 10.5px var(--sans);text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);background:#F8FAFB}
table.data tr:last-child td{border-bottom:none}
table.data td.num{text-align:right}
.pctbar{position:relative;min-width:150px;height:14px;background:var(--line-soft);border-radius:99px;overflow:hidden}
.pctbar span{position:absolute;inset:0 auto 0 0;background:var(--fail);border-radius:99px}
.pctlbl{font-size:11px;color:var(--ink-soft);margin-left:8px}
.t4col{border:1px solid var(--line-soft);border-radius:8px;padding:10px 12px;display:grid;gap:8px;min-width:0}
.t4col-hd{display:flex;gap:12px;align-items:baseline;flex-wrap:wrap}
.t4col-hd b{font:600 13px var(--mono)}
.t4col-hd span{font:12px var(--mono);color:var(--ink-soft)}
.colbadge{font:600 10px var(--sans);padding:3px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em}
.colbadge.fail{background:var(--fail-bg);color:var(--fail)}
.colbadge.acc{background:var(--acc-bg);color:var(--acc)}
th.thp{color:var(--prod)} th.thu{color:var(--uat)}
td.tdp{background:#F4F6FA} td.tdu{background:#F2F8F8}
td.tdp,td.tdu{white-space:normal;vertical-align:top}
table.data td{vertical-align:top}
.val{max-width:380px;min-width:200px;overflow-wrap:anywhere;white-space:normal;
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.samples{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
tr.xrow{display:none}
table.data.xopen tr.xrow{display:table-row}
.xtoggle{font:11px var(--sans);border:1px solid var(--line);background:var(--card);
  border-radius:6px;padding:4px 10px;cursor:pointer;color:var(--ink-soft);margin-top:6px}
.exportbtn{font:12px var(--sans);border:1px solid var(--line);background:var(--card);
  border-radius:6px;padding:6px 12px;cursor:pointer;color:var(--ink)}
.samples > div{flex:0 1 auto;min-width:0;max-width:100%}
.samples .table-wrap{max-width:100%}

/* SQL — always visible, visually quiet */
.sql{border:1px solid var(--line-soft);border-radius:8px;background:#F8FAFB;min-width:0;max-width:100%}
.sql .sql-hd{display:flex;align-items:center;gap:10px;padding:6px 10px;border-bottom:1px solid var(--line-soft)}
.sql .sql-hd b{font:600 10.5px var(--sans);text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft)}
.sql .copy{margin-left:auto;font:11px var(--sans);border:1px solid var(--line);background:var(--card);
  border-radius:6px;padding:3px 9px;cursor:pointer;color:var(--ink-soft)}
.sql pre{padding:10px 12px;font:11.5px/1.55 var(--mono);white-space:pre-wrap;overflow-wrap:anywhere;
  word-break:break-word;overflow:auto;max-height:340px}

.notes li{margin-left:18px;font-size:13.5px}
.errbox{font-family:var(--mono);font-size:12.5px;color:var(--err);background:var(--err-bg);
  border-radius:8px;padding:10px 12px;white-space:pre-wrap}
.kv{font-family:var(--mono);font-size:13px}
.kv span{color:var(--ink-soft)}
.wherebox{font:12px var(--mono);color:var(--ink-soft);display:flex;gap:6px;align-items:baseline;flex-wrap:wrap}
.wherebox code{background:#F8FAFB;border:1px solid var(--line-soft);border-radius:5px;padding:2px 7px;color:var(--ink);white-space:pre-wrap;overflow-wrap:anywhere}
.empty{color:var(--ink-soft);font-size:13.5px;padding:14px 16px}

/* history */
.hist{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;overflow-x:auto}
.hgrid{display:grid;gap:4px;align-items:center;font-family:var(--mono);font-size:12px}
.hgrid .hname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:10px}
.hcell{width:100%;height:20px;border-radius:4px}
.hcell.PASS{background:var(--pass)} .hcell.DIFFS{background:var(--fail)}
.hcell.BLOCKED{background:var(--blocked)} .hcell.ERROR,.hcell.T0{background:var(--err)}
.hcell.ACC{background:var(--acc)}
.hcell.none{background:var(--line-soft)}
.hhead{font-size:10.5px;color:var(--ink-soft);writing-mode:vertical-rl;transform:rotate(180deg);
  justify-self:center;max-height:92px;overflow:hidden}
footer{margin-top:56px;font:12px var(--mono);color:var(--ink-soft)}
@media(max-width:860px){
  .thead,.trow{grid-template-columns:minmax(140px,1fr) repeat(5,30px) 100px}
  .cell{height:16px;margin:0 2px}
}

/* print / PDF export — full report, nothing hidden, colors kept */
@media print{
  body{background:#fff;padding:0;font-size:12px}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  header{position:static;border:none}
  .controls,.copy,.xtoggle,.exportbtn{display:none!important}
  tr.xrow{display:table-row!important}
  .wrap{max-width:none;padding:0 4mm}
  .tsection,.tier,.kpi,.board,.hist{break-inside:avoid}
  .tsection{border-color:#bbb}
  .sql pre{max-height:none}
  a{text-decoration:none}
}
</style>
</head>
<body>
<header><div class="wrap mast">
  <h1>Kafka Migration&ensp;·&ensp;Test Ladder</h1>
  <span class="sub">PROD (Redshift) vs UAT (Kafka) · BI models</span>
  <span class="spacer"></span>
  <button class="exportbtn" onclick="exportHtml()" title="Download this page as a standalone HTML file">⤓ HTML</button>
  <button class="exportbtn" onclick="window.print()" title="Print or save as PDF — all collapsed samples expand automatically">Print / PDF</button>
  <label class="sub" for="runSel">Run&ensp;</label>
  <select id="runSel" aria-label="Select run"></select>
</div></header>

<div class="wrap">
  <div class="kpis" id="kpis"></div>
  <div class="spectrum" id="spectrum" title="Verdict spectrum — one band per table, click to jump"></div>
  <div class="legend">
    <span><i style="background:var(--pass)"></i>Pass</span>
    <span><i style="background:var(--acc)"></i>Diffs accepted</span>
    <span><i style="background:var(--fail)"></i>Diffs found</span>
    <span><i style="background:var(--blocked)"></i>Blocked</span>
    <span><i style="background:var(--err)"></i>Error / T0 drift</span>
    <span><i style="background:var(--skip-bg);border:1px dashed var(--line)"></i>Skipped tier</span>
  </div>

  <h2 class="sect">Summary — click a row to jump to its report</h2>
  <div class="controls">
    <input id="search" type="search" placeholder="Filter tables…" aria-label="Filter tables">
    <button class="chip" data-f="all" aria-pressed="true">All</button>
    <button class="chip" data-f="PASS" aria-pressed="false">Pass</button>
    <button class="chip" data-f="ACC" aria-pressed="false">Accepted</button>
    <button class="chip" data-f="DIFFS" aria-pressed="false">Diffs</button>
    <button class="chip" data-f="BLOCKED" aria-pressed="false">Blocked</button>
    <button class="chip" data-f="ERROR" aria-pressed="false">Error</button>
  </div>
  <div class="board">
    <div class="thead">
      <div>Table</div><div>T0</div><div>T1</div><div>T2</div><div>T3</div><div>T4</div><div>Verdict</div>
    </div>
    <div id="rows"></div>
  </div>

  <h2 class="sect">Per-table reports</h2>
  <div id="sections"></div>

  <h2 class="sect">History — verdict per table across runs</h2>
  <div class="hist"><div class="hgrid" id="hist"></div></div>

  <footer id="foot"></footer>
</div>

<script>

UNT_IF(NOT EQUAL_NULL(p.\"USER_ID\", u.\"USER_ID\")) AS \"USER_ID\",\n       COUNT_IF(NOT EQUAL_NULL(NULLIF(p.\"Phase Title\",''), NULLIF(u.\"Phase Title\",''))) AS \"Phase Title\",\n       COUNT_IF(NOT EQUAL_NULL(NULLIF(p.\"Phase Description\",''), NULLIF(u.\"Phase Description\",''))) AS \"Phase Description\",\n       COUNT_IF(NOT EQUAL_NULL(p.\"Phase Defined Start Date\", u.\"Phase Defined Start Date\")) AS \"Phase Defined Start Date\",\n       COUNT_IF(NOT EQUAL_NULL(p.\"Phase Defined End Date\", u.\"Phase Defined End Date\")) AS \"Phase Defined End Date\",\n       COUNT_IF(NOT EQUAL_NULL(p.\"Phase Start Date\", u.\"Phase Start Date\")) AS \"Phase Start Date\",\n       COUNT_IF(NOT EQUAL_NULL(p.\"Phase End Date\", u.\"Phase End Date\")) AS \"Phase End Date\",\n       COUNT_IF(NOT EQUAL_NULL(NULLIF(p.\"Phase Final Comment\",''), NULLIF(u.\"Phase Final Comment\",''))) AS \"Phase Final Comment\",\n       COUNT_IF(NOT EQUAL_NULL(NULLIF(p.\"Phase Final Comment User\",''), NULLIF(u.\"Phase Final Comment User\",''))) AS \"Phase Final Comment User\"\nFROM UAT_DB.BI_PRD.PERFORMANCE_APPRAISAL_PHASE p\nJOIN UAT_DB.BI.PERFORMANCE_APPRAISAL_PHASE u USING (\"ID\", \"CLIENT_NAME\", \"CLIENT_REGION\")\n INNER JOIN UAT_DB.BI.TEMP_ACTIVE_TENANTS AS act ON p.client_name = act.client_name AND p.client_region = act.client_region", "column_samples": {"Phase Final Comment": [[13679, "workweargroup", "SYD", "With many interdepartmental challenges I am pleased with my FY23 results.\n", "With many interdepartmental challenges I am pleased with my FY23 results."], [20719, "workweargroup", "SYD", "You have been an integral member of the Digital & Technology team over the past year, playing a key role in successfully transitioning Firefly into BAU. Your support across multiple stream, triaging incidents, resolving issues, and helping shift away from legacy systems and integrations has been invaluable.I commend the strong relationships you\u2019ve built across the team and your collaborative approach in supporting new feature development, as well as assisting the integration team as they transition to modern integration frameworks such as Workato.As discussed, a major focus for FY26 will be on strengthening our architectural foundations and establishing clear guardrails to ensure our solutions are well-designed, scalable, and built to standard. I look forward to seeing you take a lead role in this space and help shape the next phase of our technology landscape.", "You have been an integral member of the Digital & Technology team over the past year, playing a key role in successfully transitioning Firefly into BAU. Your support across multiple stream, triaging incidents, resolving issues, and helping shift away from legacy systems and integrations has been invaluable. I commend the strong relationships you\u2019ve built across the team and your collaborative approach in supporting new feature development, as well as assisting the integration team as they transition to modern integration frameworks such as Workato. As discussed, a major focus for FY26 will be on strengthening our architectural foundations and establishing clear guardrails to ensure our solutions are well-designed, scalable, and built to standard. I look forward to seeing you take a lead role in this space and help shape the next phase of our technology landscape."], [13187, "workweargroup", "SYD", "I get sh*t done!\nMy team has a reputation for being high performing and real contributors to the business even though we're small (ish)!\u00a0 We have managed team changes effectively with no impact to service levels.\nFor business impact:\u00a0 \n\nCoaching Michelle through Rt5 (and influencing broader stakeholder groups)\nCommunication with appointment of Internal Comms Manager and focus on channels, messaging and engagement\nChange Framework development (leaning in to Firefly etc)\nLeadership Capability Development/Mentoring/Lunch & Learn series establishing 'We Learn' as an important proposition for our EVP\u00a0etc\nEVP - Fit for You (discount, benefits, enhanced external profile) drawing strong candidate pools and reducing time to hire (including seamless introduction of new tech:\u00a0 LiveHire to improve the hiring experience for candidates and managers)\nELEVATE 1.0 & 2.0 concept and execution\nContinuous improvement:\u00a0 Talent/Succession Forums & Performance calibration\nEstablishment of\u00a0Culture Champ Committees for alignment and re-engergising these volunteer groups\nEngagement:\u00a0 de-briefs and actions.\u00a0 Of note, my team have a strong hand in the areas where we're strong - HSW, D&I, Actions, Learning & Development... AND we're leaning in hard on the enablement piece\nCoaching (RISE) communities\nMentoring X4 internal and external to WWG\nInaugaral Sustainability Report:\u00a0 until 9 months ago we had 0.5 of a headcount in Sustainability and with the increase in resource have gathered some more momentum.\nBase metrics are established and progress is being tracked/made against\u00a0those\u00a0targets\nSolid partnership with The Big Issue (Women's Workforce engagement) under my commitment and leadership\nHave run a seamless annual remuneration process and continue to provide education and guidance to strategic salary planning.\u00a0 Improved communication (total reward statements) with no\u00a0system.\u00a0 Accuracy high.\u00a0 Our progress against our strategy to improve pay positioning has enabled us to also improve our gender pay equity.\n\nMetrics:\n\nTurnover - trending down and to an acceptable <15%\nAbsenteeism - trending down < 3%\nEngagement Survey (Action - up, L&D up, Safety, Wellbeing & inclusion\u00a0etc strong) - I was disappointed to not see more of an improvement overall, but galvanised behind the work we need to do.\n\nThe stretch for me was in leading the NZ business in addition to my current remit.\u00a0 In a short amount of time I was able to steady the ship and have an impact.\u00a0 I have enjoyed contributing to conversations and thiking beyond my remit more broadly:\u00a0 strategy, brand execution.\u00a0 I show up as a WWG leader first, functional leader second.\u00a0 I believe I'm seen as a role model for what good leadership looks like - with a balance of warmth and strength | initiative and execution.\nFor the year ahead focus will be on getting more traction on all things simplification, Ways of Working and seeing our leadership programs translate to on the job behaviours.\u00a0 Elevating the Sustainability strategy and critically an aligned stakeholder engagement plan is front of mind and specifically wanting to see our efforts in ATSI engagement reap some rewards.\u00a0 Having a roadmap towards circularity will build engagement and confidence in what the future could look like.\u00a0 And, not to get complacent about safety, drive a campaign that connects the 'hearts' and 'minds' of our team.\n\u00a0\n", "I get sh*t done! My team has a reputation for being high performing and real contributors to the business even though we&#39;re small (ish)! We have managed team changes effectively with no impact to service levels. For business impact: Coaching Michelle through Rt5 (and influencing broader stakeholder groups) Communication with appointment of Internal Comms Manager and focus on channels, messaging and engagement Change Framework development (leaning in to Firefly etc) Leadership Capability Development/Mentoring/Lunch & Learn series establishing &#39;We Learn&#39; as an important proposition for our EVP etc EVP - Fit for You (discount, benefits, enhanced external profile) drawing strong candidate pools and reducing time to hire (including seamless introduction of new tech: LiveHire to improve the hiring experience for candidates and managers) ELEVATE 1.0 & 2.0 concept and execution Continuous improvement: Talent/Succession Forums & Performance calibration Establishment of Culture Champ Committees for alignment and re-engergising these volunteer groups Engagement: de-briefs and actions. Of note, my team have a strong hand in the areas where we&#39;re strong - HSW, D&I, Actions, Learning & Development... AND we&#39;re leaning in hard on the enablement piece Coaching (RISE) communities Mentoring X4 internal and external to WWG Inaugaral Sustainability Report: until 9 months ago we had 0.5 of a headcount in Sustainability and with the increase in resource have gathered some more momentum. Base metrics are established and progress is being tracked/made against those targets Solid partnership with The Big Issue (Women&#39;s Workforce engagement) under my commitment and leadership Have run a seamless annual remuneration process and continue to provide education and guidance to strategic salary planning. Improved communication (total reward statements) with no system. Accuracy high. Our progress against our strategy to improve pay positioning has enabled us to also improve our gender pay equity. Metrics: Turnover - trending down and to an acceptable <15% Absenteeism - trending down < 3% Engagement Survey (Action - up, L&D up, Safety, Wellbeing & inclusion etc strong) - I was disappointed to not see more of an improvement overall, but galvanised behind the work we need to do. The stretch for me was in leading the NZ business in addition to my current remit. In a short amount of time I was able to steady the ship and have an impact. I have enjoyed contributing to conversations and thiking beyond my remit more broadly: strategy, brand execution. I show up as a WWG leader first, functional leader second. I believe I&#39;m seen as a role model for what good leadership looks like - with a balance of warmth and strength | initiative and execution. For the year ahead focus will be on getting more traction on all things simplification, Ways of Working and seeing our leadership programs translate to on the job behaviours. Elevating the Sustainability strategy and critically an aligned stakeholder engagement plan is front of mind and specifically wanting to see our efforts in ATSI engagement reap some rewards. Having a roadmap towards circularity will build engagement and confidence in what the future could look like. And, not to get complacent about safety, drive a campaign that connects the &#39;hearts&#39; and &#39;minds&#39; of our team."], [16472, "workweargroup", "SYD", "George has embraced the opportunity to provide WWG with a new capability that allows WWG to realize value quickly. The endeavor and enthusiasm employed by George are commendable and a key reason why he is held in the high regard that he is.\u00a0\n\nEmbracing New Opportunities: George\u00a0has shown exceptional initiative in embracing the opportunity to create a new capability at WWG. His\u00a0forward-thinking approach and willingness to take on challenges have been instrumental in driving innovation within the organization. He consistently demonstrates a keen ability to identify areas for improvement and act on them proactively.\nCost Reduction: A standout achievement this year has been George's success in generating over $300,000 in recurring cost reduction. This significant financial impact showcases his ability to not only innovate but also to deliver tangible, bottom-line results. George's strategic thinking and execution in this area have greatly benefited the company's financial outcomes.\nInnovative Problem-Solving: George consistently finds new and inventive ways to approach problems. His\u00a0lateral thinking and ability to view challenges from multiple angles have led to novel solutions that others might have overlooked. This innovative mindset has become a valuable asset to the team and the organization as a whole.\nNew Thinking Education: Gorge has taken a leadership role in introducing and implementing GenAI and new technology solutions. More importantly, he\u00a0excels at taking others on this journey, demonstrating strong skills in knowledge sharing. His ability to explain complex concepts and generate enthusiasm for new technologies has accelerated adoption across the team and WWG.\nCollaborative Spirit: One of George's\u00a0admirable traits is his willingness to lean in and help others. George consistently goes above and beyond their role to support colleagues, demonstrating true teamwork. This collaborative approach not only boosts team morale but also enhances overall productivity and knowledge transfer within the department.\nThirst for Problem-Solving and Agile Mindset: George\u00a0exhibits a remarkable thirst for problem-solving. He approaches each challenge with enthusiasm and a readiness to dive deep into complex issues. Notably, his\u00a0embrace of the concept of \"failing fast,\" shows\u00a0a commendable willingness to take calculated risks, learn quickly from setbacks, and rapidly iterate on solutions. This agile mindset has been crucial in driving swift progress and fostering a culture of continuous improvement and discovery.\n\nThe next step of your journey is working out how we scale this capability across technology and the business,\u00a0 Also working out how we manage the change piece which is the biggest impediment (in terms of time) at the moment to getting capabilities into production.\n\u00a0\nKeen up your inquisitiveness, curiosity, and endeavor to simplify and make things easier at WWG with new an innovative ways, it is what makes you a true asset to the business.\u00a0\n", "George has embraced the opportunity to provide WWG with a new capability that allows WWG to realize value quickly. The endeavor and enthusiasm employed by George are commendable and a key reason why he is held in the high regard that he is. Embracing New Opportunities: George has shown exceptional initiative in embracing the opportunity to create a new capability at WWG. His forward-thinking approach and willingness to take on challenges have been instrumental in driving innovation within the organization. He consistently demonstrates a keen ability to identify areas for improvem ourney is working out how we scale this capability across technology and the business, Also working out how we manage the change piece which is the biggest impediment (in terms of time) at the moment to getting capabilities into production. Keen up your inquisitiveness, curiosity, and endeavor to simplify and make things easier at WWG with new an innovative ways, it is what makes you a true asset to the business."], [13344, "workweargroup", "SYD", "The customer service team has had an challenging year financial year and had to quickly learn and understand new process when we rolled out new bigger customer like BNZ and NZ Post as the process was completed new to the team . The role out brought out new challenges and saw a big increase in the team work load.\nThe customer services team work is at the pointy end of the business and the team are always first to deal with issue when things doesn't go right.\u00a0 The role are varied and busy and you have done a great job of not only embracing this, but also in supporting your team.\u00a0\u00a0\nLisa has set out this year too have a full understanding of the Etams system which she has achieved.\nLisa has been a great contributor to the Customer Services team and has in instances taken the lead and help he fellow team members with enquiries.\nThank you for your hard work Lisa and being a great team player!\n", "The customer service team has had an challenging year financial year and had to quickly learn and understand new process when we rolled out new bigger customer like BNZ and NZ Post as the process was completed new to the team . The role out brought out new challenges and saw a big increase in the team work load. The customer services team work is at the pointy end of the business and the team are always first to deal with issue when things doesn&#39;t go right. The role are varied and busy and you have done a great job of not only embracing this, but also in supporting your team. Lisa has set out this year too have a full understanding of the Etams system which she has achieved. Lisa has been a great contributor to the Customer Services team and has in instances taken the lead and help he fellow team members with enquiries. Thank you for your hard work Lisa and being a great team player!"], [12761, "workweargroup", "SYD", "FY 22 / 23 has been a rollar coaster, great tender wins with new customers coming on board in VIC AMB and VIC POLICE and their subsequent roll outs. Massive increase in sales and production with ADF. Roll out of the ALT FIT ADF uniforms and new starters in every team.\nWith all of this activity came a multitude of challenges, juggling a large work load whilst forming new working relationships with Product Managers, Designers and Production team members. Training and sharing knowledge with new team members which is time consuming in the short term but looking forward to the gains as they become more familiar with their roles and the business.\u00a0\nNavigating a number of hiccups along the way I managed to deliver on the tasks to timeline for the large majority of my work. Successfully completing the development process for customers, understanding that there is a lot that can still be done to improve the process of development and feeling like with the RISE training having better tools to try and achieve that improvement.\nI look forward to the next financial year and feel that with the always improving working dynamic within the Tech Team we will be much better equiped to be able to implement change and effective processes hopefully benficial to the entire business.\n", "FY 22 / 23 has been a rollar coaster, great tender wins with new customers coming on board in VIC AMB and VIC POLICE and their subsequent roll outs. Massive increase in sales and production with ADF. Roll out of the ALT FIT ADF uniforms and new starters in every team. With all of this activity came a multitude of challenges, juggling a large work load whilst forming new working relationships with Product Managers, Designers and Production team members. Training and sharing knowledge with new team members which is time consuming in the short term but looking forward to the gains as they become more familiar with their roles and the business. Navigating a number of hiccups along the way I managed to deliver on the tasks to timeline for the large majority of my work. Successfully completing the development process for customers, understanding that there is a lot that can still be done to improve the process of development and feeling like with the RISE training having better tools to try and achieve that improvement. I look forward to the next financial year and feel that with the always improving working dynamic within the Tech Team we will be much better equiped to be able to implement change and effective processes hopefully benficial to the entire business."], [6994, "workweargroup", "SYD", "Last year was a challenging year with COVID and Labour requirements. We saw improvements in picking area and team delivered KPI for F22 which was a great result. The second half of year has seen Amanda change in her leadership style and and made improvements in picking area.\nWith great support with HR and Ops manager has seen great improvement in her leadership and people skills .\n", "Last year was a challenging year with COVID and Labour requirements. We saw improvements in picking area and team delivered KPI for F22 which was a great result. The second half of year has seen Amanda change in her leadership style and and made improvements in picking area. With great support with HR and Ops manager has seen great improvement in her leadership and people skills ."], [4953, "workweargroup", "SYD", "2021-2022 End of Year Summary\n\nSenior Garment Technician;\nSt John AMB NT \u2013 I approved this programme without any delays to TL, and I rose to the challenge with an Industrial client. The client is soon to launch their new uniforms at the beginning of July, which is very exciting, and I cannot wait to see and hear how their new uniforms preform over the years to come.\nI am actively working on more and more industrial clients \u2013 learning, building more and more confidence with each range.\nService Australia was a challenging client this quarter. As this was the first time a Garment Tech developed product with the factory Brande, as previously this was managed by Designers and the QA team. This added pressure to the overall NPD process, as this onboarding training happened on an active client with a tight timeline. \nLeadership skills, with every new member of the Merch team I actively put my hand up to support with their own boarding, systems/ IT issues and with their training. \nWorking through ongoing learnings sessions with Nina. \nDirect report Nina:\nThe past six months has been a challenging time managing Nina, and Nina\u2019s expectations with her role and the business.  Nina decided to send an email directly to Leaders with her concerns about her role within the Uniforms team. Before this incident I had advised Nina on several occasions to raise her concerns with leader directly, however it came to ahead after the rollout of Timesheet under the Textile award. I did raise with leaders that the announcement of the 85K band bracket was a mistake, as this made Nina aware that her pay was less than other members within the team, causing unnecessary friction. \nI have been supporting Nina through this as best as I can, however more recently this came to ahead with Nina\u2019s poor behaviour towards me. Punishing me for business decisions that I cannot control. More recently I reached out to Nikki T for support on this, as it has been impacting my mental health. \nI will be monitoring Nina\u2019s behaviour going forward and holding her accountable where I see fit. \nNina hasn\u2019t actioned any of the sessions I have recommended for her MyGoals throughout 2022. For FY23 I will be suggesting the following;\n\u2022\tRecommending Basic software sessions for Nina. \n\u2022\tStill hasn\u2019t used Dragon Software. \n\u2022\tHasn\u2019t set up any leadership/ \u201cNina knows\u201d sessions with the wider technical and design teams.\n\u2022\tNina recently chaired 1x Toolbox talk.\nNina stated on going issues with completing the Merch Tracker. I Stressed to Nina this shouldn\u2019t require overtime especially on a weekend. I have organised another \u201chow to\u201d training session chaired by Anais. \nAt Q3 2022 Mygoals review Nina advised she doesn\u2019t understand the benefits of MyGoals and shows an ongoing lack of interest or accountability for her MyGoals Doc. Nina also revealed she isn\u2019t confident with how to complete/ fill in the MyGoals document. I advised Nina on the importance of her MyGoals and that her lack of confidence with the document, could be rectified with a training session with HR.  Nina eventually reached out to Nikki T for a training session. And after this session I advised Nina her MyGoals needs to be a priority for FY23, and that she needs to start allocating time on a weekly basis to spend time capturing her progress. I have advised she manage this like a client, and stop putting her hand up for more work, and then telling me she hasn\u2019t had time to complete her Mygoals at each quarter.\n", "2021-2022 End of Year Summary Senior Garment Technician; St John AMB NT \u2013 I approved this programme without any delays to TL, and I rose to the challenge with an Industrial client. The client is soon to launch their new uniforms at the beginning of July, which is very exciting, and I cannot wait to see and hear how their new uniforms preform over the years to come. I am actively working on more and more industrial clients \u2013 learning, building more and more confidence with each range. Service Australia was a challenging client this quarter. As this was the first time a Garment Tech developed product with the factory Brande, as previously this was managed by Designers and the QA team. This added pressure to the overall NPD process, as this onboarding training happened on an active client with a tight timeline. Leadership skills, with every new member of the Merch team I actively put my hand up to support with their own boarding, systems/ IT issues and with their training. Working through ongoing learnings sessions with Nina. Direct report Nina: The past six months has been a challenging time managing Nina, and Nina\u2019s expectations with her role and the business. Nina decided to send an email directly to Leaders with her concerns about her role within the Uniforms team. Before this incident I had advised Nina on several occasions to raise her concerns with leader directly, however it came to ahead after the rollout of Timesheet under the Textile award. I did raise with leaders that the announcement of the 85K band bracket was a mistake, as this made Nina aware that her pay was less than other members within the team, causing unnecessary friction. I have been supporting Nina through this as best as I can, however more recently this came to ahead with Nina\u2019s poor behaviour towards me. Punishing me for business decisions that I cannot control. More recently I reached out to Nikki T for support on this, as it has been impacting my mental health. I will be monitoring Nina\u2019s behaviour going forward and holding her accountable where I see fit. Nina hasn\u2019t actioned any of the sessions I have recommended for her MyGoals throughout 2022. For FY23 I will be suggesting the following; \u2022 Recommending Basic software sessions for Nina. \u2022 Still hasn\u2019t used Dragon Software. \u2022 Hasn\u2019t set up any leadership/ \u201cNina knows\u201d sessions with the wider technical and design teams. \u2022 Nina recently chaired 1x Toolbox talk. Nina stated on going issues with completing the Merch Tracker. I Stressed to Nina this shouldn\u2019t require overtime especially on a weekend. I have organised another \u201chow to\u201d training session chaired by Anais. At Q3 2022 Mygoals review Nina advised she doesn\u2019t understand the benefits of MyGoals and shows an ongoing lack of interest or accountability for her MyGoals Doc. Nina also revealed she isn\u2019t confident with how to complete/ fill in the MyGoals document. I advised Nina on the importance of her MyGoals and that her lack of confidence with the document, could be rectified with a training session with HR. Nina eventually reached out to Nikki T for a training session. And after this session I advised Nina her MyGoals needs to be a priority for FY23, and that she needs to start allocating time on a weekly basis to spend time capturing her progress. I have advised she manage this like a client, and stop putting her hand up for more work, and then telling me she hasn\u2019t had time to complete her Mygoals at each quarter."], [17737, "workweargroup", "SYD", "I allocate payments daily to a high percentage and accurately and with constantly varying volumes whilst maintaining\u00a0 and managing my other duties which includes processing of chargebacks, EFT refunds, Vendor creation and modifications from the\u00a0 EFTSURE portal via Peoplesoft. Allocations for accounts for Bunnings and Frontline are up to date and allocated accurately allowing queries and issues to be attended to with confidence. I also attend to payment link requests to enable credit card payments to be received as soon as possible. My skills in relation to X and V Lookups has increased considerably in the last 12 months giving me additional confidence in using these to make my workload simpler and easier to manage. I always try to work as efficiently as possible and coordinate my daily tasks in an order which I believe will best benefit our customers and teams needs.\n", "I allocate payments daily to a high percentage and accurately and with constantly varying volumes whilst maintaining and managing my other duties which includes processing of chargebacks, EFT refunds, Vendor creation and modifications from the EFTSURE portal via Peoplesoft. Allocations for accounts for Bunnings and Frontline are up to date and allocated accurately allowing queries and issues to be attended to with confidence. I also attend to payment link requests to enable credit card payments to be received as soon as possible. My skills in relation to X and V Lookups has increased considerably in the last 12 months giving me additional confidence in using these to make my workload simpler and easier to manage. I always try to work as efficiently as possible and coordinate my daily tasks in an order which I believe will best benefit our customers and teams needs."], [17189, "workweargroup", "SYD", "Can add and refine in our catch up\n", "Can add and refine in our catch up"], [20619, "workweargroup", "SYD", "Strong result to finish only $144k behind LY in Gross Sales and just $27k behind LY in margin $.Remembering we have had several years of strong growth in NSW and FY25 has seen extremely tough trading conditions, especially in Retail.Good work with Fully Promoted and although we still have a few things to finalise I know that the groundwork has been laid to achieve some strong growth in FY26 with these accounts.Great results in Footwear with overall sales up to $987k and XtremeGuard at $193k and x1610 units sold. This will give us a solid base to expand on footwear sales in FY26.Thanks for you support over the last 9 months, has made the transition into the Regional role much easier than it could have been.I'm looking forward to working with you in FY26\u00a0", "Strong result to finish only $144k behind LY in Gross Sales and just $27k behind LY in margin $. Remembering we have had several years of strong growth in NSW and FY25 has seen extremely tough trading conditions, especially in Retail. Good work with Fully Promoted and although we still have a few things to finalise I know that the groundwork has been laid to achieve some strong growth in FY26 with these accounts. Great results in Footwear with overall sales up to $987k and XtremeGuard at $193k and x1610 units sold. This will give us a solid base to expand on footwear sales in FY26. Thanks for you support over the last 9 months, has made the transition into the Regional role much easier than it could have been. I'm looking forward to working with you in FY26"], [17666, "workweargroup", "SYD", "Jai has made positive steps towards meeting most of the goals that we have set with him at the start of the FY. We have had a lot of evolution within the supply chain space since these goals were set, and despite the changing landscape Jai has still managed to meet a lot of the expectations we worked together on setting for him.\nJai has been pivotal in the International space, which includes liasing directly with our International Brand Manager on shipping requirements for the growing orders we are seeing in this space, as well as taking on the responsibility of the Indent reporting. Both of these pieces have given him a chance to expose himself to a wider audience internally, and build confidence in spaces where there is more ambiguiety in how to tackle problems.\nAs mentioned with Jai, the Supply Chain Visibility piece needs more focus (particularly in the \"PO Management\" space) as we transition to a more proactive department. This will be a key focus for us in FY25 and will be more inportant for us than ever to achieve the goals we impose for ourselves within the department.\nOverall, a solid performance from Jai over a challenging year, and though we have focus areas to work on as mentioned above, we have made solid steps to get us in a position to address these.\n", "Jai has made positive steps towards meeting most of the goals that we have set with him at the start of the FY. We have had a lot of evolution within the supply chain space since these goals were set, and despite the changing landscape Jai has still managed to meet a lot of the expectations we worked together on setting for him. Jai has been pivotal in the International space, which includes liasing directly with our International Brand Manager on shipping requirements for the growing orders we are seeing in this space, as well as taking on the responsibility of the Indent reporting. Both of these pieces have given him a chance to expose himself to a wider audience internally, and build confidence in spaces where there is more ambiguiety in how to tackle problems. As mentioned with Jai, the Supply Chain Visibility piece needs more focus (particularly in the \"PO Management\" space) as we transition to a more proactive department. This will be a key focus for us in FY25 and will be more inportant for us than ever to achieve the goals we impose for ourselves within the department. Overall, a solid performance from Jai over a challenging year, and though we have focus areas to work on as mentioned above, we have made solid steps to get us in a position to address these."], [21388, "workweargroup", "SYD", "Bernice has moved positions in the DC across to picking and has shown strong growth in her practical role and skill of work her Involvement in project planning with the FTS rack reconfiguration has been strong and supportive.\u00a0Bernice still has a lot to learn and focusing on people discussions and management style or her brand is key to her development and progress and what we should focus on FY26. \u00a0", "Bernice has moved positions in the DC across to picking and has shown strong growth in her practical role and skill of work her Involvement in project planning with the FTS rack reconfiguration has been strong and supportive. Bernice still has a lot to learn and focusing on people discussions and management style or her brand is key to her development and progress and what we should focus on FY26."], [17887, "workweargroup", "SYD", "Build a relationship with\u00a0the business as a key ally\u00a0and commercial partner\nI have met all measures against this goal by:\n\nparticipating in internal kick-off calls for new matters\nresponding to risk inbox inquiries within 48hrs\u00a0(sooner in most instances)\nprovided proactive updates and realistic turnaround time estimates to the business\nremained inquisitive and actively participated in knowledge building sessions with various parts of the business\n\nThis is also supported by the feedback received during my360 peer review, where communication, efficiency and transparency were highlighted as areas of high performance.\n\u00a0\nBecome the SME for Open Windows\nI have greatly improved my understanding of the Open Windows platform by being an active participant throughout formal training, trialing various setup configurations with hands on exposure and knowledge sharing with other WIS businesses. During setup, I have adopted a System Administrator role, and will need to continue monitoring performance of the system from the backend.\nThe implementation is not yet at a point to be launched to the business for use outside the Contracts Team, and I therefore have not yet run introductory sessions. This measure is offset however by completion of uploading all active agreements across Uniforms, Marketing, Tech, Supply Chain, Sustainability, HR and more.\nUploading now includes key data summaries as well as automated reminders for expiries and price reviews, and extension periods ready to be exercised within the system. A plan is in place to facilitate uploading of Wholesale SLAs and I continue optimise configuration as suitable.\n\u00a0\nPrioritisation of Matters\nI have continued to effectively prioritise my time and competing interests, particularly between the long term project of Open Windows and day to day contract matters. I communicate realistic timelines to the business, self allocate matters where possible and otherwise update the Contracts Team when I have capacity.\nMy daily updating of Planner to track matter notes and current responsible parties has greatly improved visibility of workload in the team and assisted in communicating weekly priorities to the business.\n\u00a0\nSupport high/med/low risk pre-agreed positions matrix\nI attended a Contracts Team session to review the pre-agreed positions matrix and subsequent sessions for each of the Sales teams. I will continue to draft departures and other negotiations in accordance with the matrix.\n", "Build a relationship with the business as a key ally and commercial partner I have met all measures against this goal by: participating in internal kick-off calls for new matters responding to risk inbox inquiries within 48hrs (sooner in most instances) provided proactive updates and realistic turnaround time estimates to the business remained inquisitive and actively participated in knowledge building sessions with various parts of the business This is also supported by the feedback received during my360 peer review, where communication, efficiency and transparency were highlighted as areas of high performance. Become the SME for Open Windows I have greatly improved my understanding of the Open Windows platform by being an active participant throughout formal training, trialing various setup configurations with hands on exposure and knowledge sharing with other WIS businesses. During setup, I have adopted a System Administrator role, and will need to continue monitoring performance of the system from the backend. The implementation is not yet at a point to be launched to the business for use outside the Contracts Team, and I therefore have not yet run introductory sessions. This measure is offset however by completion of uploading all active agreements across Uniforms, Marketing, Tech, Supply Chain, Sustainability, HR and more. Uploading now includes key data summaries as well as automated reminders for expiries and price reviews, and extension periods ready to be exercised within the system. A plan is in place to facilitate uploading of Wholesale SLAs and I continue optimise configuration as suitable. Prioritisation of Matters I have continued to effectively prioritise my time and competing interests, particularly between the long term project of Open Windows and day to day contract matters. I communicate realistic timelines to the business, self allocate matters where possible and otherwise update the Contracts Team when I have capacity. My daily updating of Planner to track matter notes and current responsible parties has greatly improved visibility of workload in the team and assisted in communicating weekly priorities to the business. Support high/med/low risk pre-agreed positions matrix I attended a Contracts Team session to review the pre-agreed positions matrix and subsequent sessions for each of the Sales teams. I will continue to draft departures and other negotiations in accordance with the matrix."], [18259, "workweargroup", "SYD", "Enhanced communication efficiency by prioritizing Teams for urgent matters, reducing Outlook overload. Completed Communication 101 course. Through strong and improved communication I have built trust with stakeholders.\nAchieved Style Admin cross-training goal by dedicating 10 hours per week during Nov-Jan, mastering new processes, and enhancing efficiency in BoB. Cross-training expanded my skill set and contributes significantly to team development.\nStrengthened supplier communication, fostering proactive engagement and solution-oriented discussions. Urgent matters are efficiently handled. Streamlined email processes, reducing congestion. Progress is notable, though further improvement remains a goal.\n", "Enhanced communication efficiency by prioritizing Teams for urgent matters, reducing Outlook overload. Completed Communication 101 course. Through strong and improved communication I have built trust with stakeholders. Achieved Style Admin cross-training goal by dedicating 10 hours per week during Nov-Jan, mastering new processes, and enhancing efficiency in BoB. Cross-trainin nd is now well ahead of schedule, and I would say she is at or nearing this point now. She is currently managing the majority of the commercial responsibilities on ECQ3, to the point where it's allowed me to spend more time and focus on both programming and tenancy co-ordination, as the project commercials are well and truly taken care of. Piper has also recently shown she has strong mentoring / training skills, as she continues to support Tinashe Musukutwa with his cadet CA module. I will continue to support Piper with her long term goal of becoming a commercial manager by continually increasing responsibilities and empowering commercial decision making. Piper is a valuable asset to the business, and I\u2019m grateful to have her as an excelling team member at ECQ3. Areas for Piper to continue to increase capabilities over the remainder of the project include: - Continuing to increase client negotiation opportunities on complex variations. - Continuing to expand on cost reporting skills - Project Set-up training (As PS Joined post ECQ3 set-up this is an important step for us to dedicate training towards) Project Close-out (From october 25 onwards)"], [10734, 10832, "buildcorp", "SYD", "Personal Performance Goal \nNathan wants more in-depth knowledge of Asta so he can run the site program on his own. For the time being, I'm doing this for him. More regular site meetings and reviews against the target program will steer the subcontractors to ensure program delivery.\n\nPersonal Development Goal\nNathan has committed to mentoring Ryan and Matthew which has created a tight-knit site team.", "Personal Performance Goal Nathan wants more in-depth knowledge of Asta so he can run the site program on his own. For the time being, I'm doing this for him. More regular site meetings and reviews against the target program will steer the subcontractors to ensure program delivery. Personal Development Goal Nathan has committed to mentoring Ryan and Matthew which has created a tight-knit site team."], [23763, 11110, "buildcorp", "SYD", "There are abundant opportunities for system improvement and looking forward to the challenge. \nI'm extremely grateful for the Quality team, which Buildcorp have assemble. They are proving to be extremely diligent and of great assistance.", "There are abundant opportunities for system improvement and looking forward to the challenge. I'm extremely grateful for the Quality team, which Buildcorp have assemble. They are proving to be extremely diligent and of great assistance."], [21228, 21358, "caa", "SYD", "Keep team motivation, esp staff who have varying levels of energy and those covering markets with an increase in focus.Onboarding new Americas commissioner and helping Denny return to his substantive yet new marketActivating SEA markets and activities", "Keep team motivation, esp staff who have varying levels of energy and those covering markets with an increase in focus. Onboarding new Americas commissioner and helping Denny return to his substantive yet new market Activating SEA markets and activities"], [9805, 12621, "buildcorp", "SYD", "Rhys has had an excellent year with overseeing multiple projects and team members. This has reflected in how he is perceived in the business\n-done well juggling multiple projects\n-working well with new team but stay close to monitor capability before trusting\n-good mentoring to younger team members, explains reasons for decisions, knowledge sharing\n-recognition of team members\n-good attitude and positive environment onsite\n\n\nFocus areas for next period\n-clearer with comms. Pause and consider response to avoid getting jumbled \n-look at delegations of tasks instead of just doing yourself\n\n\nGOALS\n-Create a positive working environment - achieved\n-work/life balance - gym, holidays - achieved\n-AI integration  - copilot app and ChatGPT - achieved\n-Involvement of HSE processes - focus for next period (walk with BSafe, high risk workshop)", "Rhys has had an excellent year with overseeing multiple projects and team members. This has reflected in how he is perceived in the business -done well juggling multiple projects -working well with new team but stay close to monitor capability before trusting -good mentoring to younger team members, explains reasons for decisions, knowledge sharing -recognition of team members -good attitude and positive environment onsite Focus areas for next period -clearer with comms. Pause and consider response to avoid getting jumbled -look at delegations of tasks instead of just doing yourself GOALS -Create a positive working environment - achieved -work/life balance - gym, holidays - achieved -AI integration - copilot app and ChatGPT - achieved -Involvement of HSE processes - focus for next period (walk with BSafe, high risk workshop)"], [4947, 1236, "caa", "SYD", "I would like to attend this workshop \"Development of Records Management Online Training\"\nhttps://www.rimpa.com.au/events/ems-events-calendar/development-of-records-management-online-training-27-03-2024.html", "I would like to attend this workshop \"Development of Records Management Online Training\" https://www.rimpa.com.au/events/ems-events-calendar/development-of-records-management-online-training-27-03-2024.html"], [7095, 4960, "buildcorp", "SYD", "Khalid is progressing well and understanding the various process' of the CA side of the role.\nHe has a positive attitude, communicates clearly, has good work ethic,  and is a welcome addition to the team. \nKeep up the good work.", "Khalid is progressing well and understanding the various process' of the CA side of the role. He has a positive attitude, communicates clearly, has good work ethic, and is a welcome addition to the team. Keep up the good work."], [3471, 2663, "buildcorp", "SYD", "I am happy with how I have been progressing with my development as a Project Manager for the first half of this year. I have been involved in  different aspects than I am used to (mainly tendering ve than a participant not being 100% engaged."], [2002, 1573, "charterkc", "SYD", "Brittaney, it\u2019s wonderful to hear how much you appreciate the support you\u2019re receiving and how you\u2019re embracing the opportunities to grow in your role.\nYour positive attitude has been a significant contributor to the atmosphere within our small team and across Charter. It\u2019s great to see how your enthusiasm and eagerness to learn have had such a positive impact. As a young professional, you\u2019ve shown exceptional dedication to developing your skills and seeking opportunities to grow, well done!\nYou\u2019ve consistently maintained a professional demeanour when interacting with both internal and external stakeholders. I\u2019d particularly like to commend the way you handle incoming calls, including the more challenging ones. Your ability to remain composed, understanding and solution-focused reflects extremely well on you and on Charter.\nI also want to acknowledge that stepping into a corporate environment like Charter\u2019s may have been outside your comfort zone at times. Despite this, you\u2019ve handled yourself with poise and professionalism, which is a testament to your character and adaptability.", "Brittaney, it\u2019s wonderful to hear how much you appreciate the support you\u2019re receiving and how you\u2019re embracing the opportunities to grow in your role. Your positive attitude has been a significant contributor to the atmosphere within our small team and across Charter. It\u2019s great to see how your enthusiasm and eagerness to learn have had such a positive impact. As a young professional, you\u2019ve shown exceptional dedication to developing your skills and seeking opportunities to grow, well done! You\u2019ve consistently maintained a professional demeanour when interacting with both internal and external stakeholders. I\u2019d particularly like to commend the way you handle incoming calls, including the more challenging ones. Your ability nSustainability\u00a0\nACHIEVMENTS:\nHad our BIGGEST day of picking on the farm last season.\nBiggest yield from Coes farm.\nZERO rejections\nGood relationship and communication with commercial\u00a0\nCost saving by changing Agpick to QR codes and that will be used by other farms in the busniss.\u00a0\nPassed all our audits: Freshcare and had a WHS un announced audit by the Department.\n\u00a0\n", "Managing Farm Irrigation/Fertigation Pest and disease Trials Harvesting Budget Sustainability ACHIEVMENTS: Had our BIGGEST day of picking on the farm last season. Biggest yield from Coes farm. ZERO rejections Good relationship and communication with commercial Cost saving by changing Agpick to QR codes and that will be used by other farms in the busniss. Passed all our audits: Freshcare and had a WHS un announced audit by the Department."], [1252, "perfection", "SYD", "I strongly believe that I would have met my EBITDA.\nWe had the fruit to pick on the plants and due to the pricing per kg, we were told to stop.\nOn crop work and maint, I would've also been in a better position if the positions on the farm was filled with a irrigation supervisor and a maintenance worker that was never replaced by previous management. These 2 positions was never replaced and the budget was not adjusted.\u00a0\n", "I strongly believe that I would have met my EBITDA. We had the fruit to pick on the plants and due to the pricing per kg, we were told to stop. On crop work and maint, I would&#39;ve also been in a better position if the positions on the farm was filled with a irrigation supervisor and a maintenance worker that was never replaced by previous management. These 2 positions was never replaced and the budget was not adjusted."], [378, "perfection", "SYD", "- activetly participate in meetings & projects\n- I take initiative and innovate to problem solve\n- give any challenge 100%\n", "- activetly participate in meetings & projects - I take initiative and innovate to problem solve - give any challenge 100%"], [381, "perfection", "SYD", "Growing and Ripening Guide for Little Gem & Havana bananas\n- worked with plant breeders & growers for feedback on current growing practices\u00a0\n- performed product testing on varietals\u00a0\n- the over-arching recommendation is to consult industry best practice - not a tool on 'how to grow bananas'\u00a0\n- still more work to be done for pack layout & ripening recommendation. Need more access to fruit for trials.\n\u00a0\n", "Growing and Ripening Guide for Little Gem & Havana bananas - worked with plant breeders & growers for feedback on current growing practices - performed product testing on varietals - the over-arching recommendation is to consult industry best practice - not a tool on &#39;how to grow bananas&#39; - still more work to be done for pack layout & ripening recommendation. Need more access to fruit for trials."], [376, "perfection", "SYD", "- Assisting the team with resource allocation, allocating loggers to farms and RDC's & leading logger distribution to ensure they're used only to target quality issues (not random allocation). Sharing loggers between locations to lower costs.\n- Variations to ensure continuity of supply and lower wastage\n- Finding innovative solutions to lower labour costs eg. training category team members for assessments & performing shelf life assessments\u00a0\n", "- Assisting the team with resource allocation, allocating loggers to farms and RDC&#39;s & leading logger distribution to ensure they&#39;re used only to target quality issues (not random allocation). Sharing loggers between locations to lower costs. - Variations to ensure continuity of supply and lower wastage - Finding innovative solutions to lower labour costs eg. training category team members for assessments & performing shelf life assessments"], [3192, "perfection", "SYD", "I have contributed to transition towards Safety Culture from Device Magic. I have endeavored to foster team engagement and guided collaboration with procurement & IT Teams.I also led the completion of farm audits for our 5 Ecoganic sites as well as assisted conventional growers with Freshcare/HARPS requirements.\u00a0Rejection rate 1.52% (target 1.50%). The specification review to include higher tolerance of speckling and sooty blotch contributing to less disease rejections over FY25.I have actively contributed to product innovation with the banana chip idea and trials. This product would reduce waste at a farm level by 80% and not require any ripening expense.Additionally, I have begun preliminary involvement with the mango teams, supporting early-stage processes and establishing relationships to extend the same level of technical support and compliance focus.\u00a0", "I have contributed to transition towards Safety Culture from Device Magic. I have endeavored to foster team engagement and guided collaboration with procurement & IT Teams. I also led the completion of farm audits for our 5 Ecoganic sites as well as assisted conventional growers with Freshcare/HARPS requirements. Rejection rate 1.52% (target 1.50%). The specification review to include higher tolerance of speckling and sooty blotch contributing to less disease rejections over FY25. I have actively contributed to product innovation with the banana chip idea and trials. This product would reduce waste at a farm level by 80% and not require any ripening expense. Additionally, I have begun preliminary involvement with the mango teams, supporting early-stage processes and establishing relationships to extend the same level of technical support and compliance focus."], [379, "perfection", "SYD", "Additional achievements\n- I ticked lead performer for the specification update with Woolworths. This has been a project that I have been re-addressing with our customer for over 4 years with the attitude of persistence. This year we were able to acheive an increase in allowance for 5 different defects; neck damage, rust thrip, speckling, sooty blotch & pest damage.\n- Developed a speckling assessment tool which was accepted by Woolworths. Customer has requested sooty blotch assessment tool to follow.\u00a0\n", "Additional achievements - I ticked lead performer for the specification update with Woolworths. This has been a project that I have been re-addressing with our customer for over 4 years with the attitude of persistence. This year we were able to acheive an increase in allowance for 5 different defects; neck damage, rust thrip, speckling, sooty blotch & pest damage. - Developed a speckling assessment tool which was accepted by Woolworths. Customer has requested sooty blotch assessment tool to follow."], [380, "perfection", "SYD", "QIP Plan\nMelbourne RDC -\u00a0Resulted in an action plan for September (previously agreed through Thibault). Discussions to be raised with warehouse & category team for a new 3 phase power point to be installed prior to mango season so that bananas can be moved a location that will minimise the impact of temperature increases due to other climacteric products. This will decrease rejection rate but also increase shelf life of bananas.\u00a0\nInfrastructure upgrade to be the long term vision.\u00a0\n", "QIP Plan Melbourne RDC - Resulted in an action plan for September (previously agreed through Thibault). Discussions to be raised with warehouse & category team for a new 3 phase power point to be installed prior to mango season so that bananas can be moved a location that will minimise the impact of temperature increases due to other climacteric products. This will decrease rejection rate but also increase shelf life of bananas. Infrastructure upgrade to be the long term vision."], [377, "perfection", "SYD", "- Ensure uniform and safety boots are worn on site at all sites including farms & RDC's when travelling\u00a0\nAs majority of my time is based on 3rd party farms;\n- Completed fire warden awareness training (which includes safety training) on behalf of growers to assist with WHS requirements for Sedex\n- Assisted grower third party audits for both QLD Gov WHS & Sedex\n- Completed banana centric WHS risk assessment for all growers\n", "- Ensure uniform and safety boots are worn on site at all sites including farms & RDC&#39;s when travelling As majority of my time is based on 3rd party farms; - Completed fire warden awareness training (which includes safety training) on behalf of growers to assist with WHS requirements for Sedex - Assisted grower third party audits for both QLD Gov WHS & Sedex - Completed banana centric WHS risk assessment for all growers"], [259, "perfection", "SYD", "Key objectives were to supervise the pack house when required during packing season. Work in the farm in low season including in the R&D dept and Laboratory. I completed and obtained my first aid certificate. I have also obtained my Aus drivers licence (open auto) and really need to obtain my fork lift licence to complete my packhouse duties. I would also like to have more computer skills to give me more confidence on reporting.\n", "Key objectives were to supervise the pack house when required during packing season. Work in the farm in low season including in the R&D dept and Laboratory. I completed and obtained my first aid certificate. I have also obtained my Aus drivers licence (open auto) and really need to obtain my fork lift licence to complete my packhouse duties. I would also like to have more computer skills to give me more confidence on reporting."], [257, "perfection", "SYD", "To supervise the pack house operations so that workers dont waste time and money\n", "To supervise the pack house operations so that workers dont waste time and money"], [258, "perfection", "SYD", "Inducting new employees to the pack house before they start work and make sure they know how to work safely and efficiently. When working in the farm (maintenance of plants, ) during low season very often run the safety moment meetings before work starts.\n", "Inducting yone is working safely.\n", "Alain perform good saftey with staff and ensuring everyone is working safely."], [1014, "perfection", "SYD", "I alway treat the people with the respect all the time.\n", "I alway treat the people with the respect all the time."], [1651, "perfection", "SYD", "i agree\n", "i agree"], [1656, "perfection", "SYD", "I agree he alway works with his staffs ion a safely manner.\n", "I agree he alway works with his staffs ion a safely manner."], [1645, "perfection", "SYD", "i agree, she is well organise all the time, have good disclipine with the people.\n", "i agree, she is well organise all the time, have good disclipine with the people."], [1655, "perfection", "SYD", "Being the first, he\u00a0 have done a really good to learn as make as can in picking and Cropwork.It have been though but he still manage to get through all the with hestitation. to try hit target and budget speeds.\n", "Being the first, he have done a really good to learn as make as can in picking and Cropwork.It have been though but he still manage to get through all the with hestitation. to try hit target and budget speeds."], [1013, "perfection", "SYD", "I always try to demostrate as much as i can to be a leading model for my team so we can be secessful because i have passion of what i do.\n", "I always try to demostrate as much as i can to be a leading model for my team so we can be secessful because i have passion of what i do."], [2694, "perfection", "SYD", "I would say there was some up and down due the situation of what was happening due to virus. I am pleased to see stage 5 was at good shape even when we had to pullout crop earlier then time. There was no disease or virus in the crop. also, after planting the new crop of Dorma Plum and Bodelle in this year crop we done stills keep on top of hygiene and testing has come negative till now. Only thing for me now is keep on top of Boytitis and leave Mould which is now almost end of crop.Saving - We did at start of the crop save couple hundred hours every week, until more De-leafing and cutting comes through from after picking which we had to do overtime for. Crop was at 4.8 density and Dorma Plum was so compacted that we had to do more leaves than usual. I had to bring people most Saturday to keep on top of crop jobs.Now last couple crop is looking much better and in the last month we finish all crop jobs on time and speed, and performance has also improved a lot. Hoping to keep it this way till the end of crop.\u00a0", "I would say there was some up and down due the situation of what was happening due to virus. I am pleased to see stage 5 was at good shape even when we had to pullout crop earlier then time. There was no disease or virus in the crop. also, after planting the new crop of Dorma Plum and Bodelle in this year crop we done stills keep on top of hygiene and testing has come negative till now. Only thing for me now is keep on top of Boytitis and leave Mould which is now almost end of crop. Saving - We did at start of the crop save couple hundred hours every week, until more De-leafing and cutting comes through from after picking which we had to do overtime for. Crop was at 4.8 density and Dorma Plum was so compacted that we had to do more leaves than usual. I had to bring people most Saturday to keep on top of crop jobs. Now last couple crop is looking much better and in the last month we finish all crop jobs on time and speed, and performance has also improved a lot. Hoping to keep it this way till the end of crop."], [1646, "perfection", "SYD", "Kaushayla is very ethical and honest in what she does.\n", "Kaushayla is very ethical and honest in what she does."], [1650, "perfection", "SYD", "I agree.\n", "I agree."], [3593, "perfection", "SYD", "I Agree, he has improved with safety quality, Productivity with the team. Being in the hygiene committee and ensuring all staffs works high standard and procedures.\u00a0", "I Agree, he has improved with safety quality, Productivity w
